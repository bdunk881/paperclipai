name: Deploy Docs to Cloudflare Pages

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-cloudflare-pages.yml"
  push:
    branches:
      - migration
    paths:
      - "docs/**"
      - ".github/workflows/docs-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: docs
          packageManager: npm
          command: pages deploy build/client --project-name=autoflow-docs

      - name: Summarize deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.pages-deployment-id }}
          DEPLOYMENT_ENVIRONMENT: ${{ steps.deploy.outputs.pages-environment }}
        run: |
          {
            echo "## Cloudflare Pages deployment"
            echo
            echo "- Environment: ${DEPLOYMENT_ENVIRONMENT:-unknown}"
            echo "- Deployment ID: ${DEPLOYMENT_ID:-unknown}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-unavailable}"
            echo "- Alias URL: ${DEPLOYMENT_ALIAS_URL:-unavailable}"
          } >> "$GITHUB_STEP_SUMMARY"

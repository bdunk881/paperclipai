name: Provider-Facing Connector Suite

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  tier1-provider-facing:
    name: Tier 1 Provider-Facing Connectors
    if: ${{ vars.TIER1_PROVIDER_TESTS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REQUIRE_ALL_TIER1_CONNECTORS: "true"
      TIER1_GMAIL_TO_EMAIL: ${{ vars.TIER1_GMAIL_TO_EMAIL }}
      TIER1_HUBSPOT_CONTACT_ID: ${{ vars.TIER1_HUBSPOT_CONTACT_ID }}
      TIER1_LINEAR_ISSUE_ID: ${{ vars.TIER1_LINEAR_ISSUE_ID }}
      TIER1_SLACK_CHANNEL_ID: ${{ vars.TIER1_SLACK_CHANNEL_ID }}
      TIER1_STRIPE_CUSTOMER_ID: ${{ vars.TIER1_STRIPE_CUSTOMER_ID }}
      TEAMS_TENANT_ID: ${{ vars.TEAMS_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull Tier 1 connector secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal-auth
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: autoflow
          env-slug: dev

      - name: Validate Tier 1 connector secrets
        run: |
          set -euo pipefail
          required_vars=(
            TIER1_APOLLO_API_KEY
            TIER1_GMAIL_API_KEY
            TIER1_HUBSPOT_API_KEY
            TIER1_LINEAR_API_KEY
            TIER1_SENTRY_API_KEY
            TIER1_SLACK_BOT_TOKEN
            TIER1_STRIPE_API_KEY
            TIER1_TEAMS_API_KEY
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required Infisical secret ${name}"
              exit 1
            fi
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test:connectors:provider

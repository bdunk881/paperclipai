<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#0F172A"/>
  
  <!-- Tile Card -->
  <rect x="50" y="50" width="300" height="200" rx="12" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <rect x="50" y="50" width="300" height="200" rx="12" fill="#6366F1" fill-opacity="0.03"/>
  
  <!-- Glow Effect (Hover Simulation) -->
  <rect x="50" y="50" width="300" height="200" rx="12" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-opacity="0.4" style="filter: drop-shadow(0 0 4px #6366F1)"/>

  <!-- Content -->
  <rect x="74" y="74" width="48" height="48" rx="8" fill="#1E293B"/>
  <circle cx="98" cy="98" r="12" fill="#14B8A6"/>
  <text x="74" y="155" font-family="Inter, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">Linear</text>
  <text x="74" y="185" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8">Sync projects and issues to automate</text>
  <text x="74" y="205" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8">triage and status updates.</text>
  
  <!-- Badge -->
  <rect x="250" y="74" width="80" height="22" rx="11" fill="#0F172A" stroke="#14B8A6" stroke-opacity="0.3"/>
  <text x="290" y="89" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#14B8A6" text-anchor="middle">MCP VERIFIED</text>
</svg>

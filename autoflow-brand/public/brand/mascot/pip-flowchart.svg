<svg viewBox="0 0 160 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flowchart board being held -->
  <rect x="75" y="12" width="72" height="90" rx="6" fill="#F7FAFC"/>
  <rect x="75" y="12" width="72" height="90" rx="6" stroke="#2D3748" strokeWidth="2" fill="none"/>
  <!-- Board clip at top -->
  <rect x="102" y="8" width="18" height="8" rx="3" fill="#2D3748"/>
  <rect x="106" y="6" width="10" height="5" rx="2" fill="#4A3AFF"/>

  <!-- Flowchart on board -->
  <!-- Start circle -->
  <ellipse cx="111" cy="28" rx="14" ry="8" fill="#00D4B8"/>
  <text x="111" y="31" textAnchor="middle" fontFamily="monospace" fontSize="7" fill="white" fontWeight="bold">START</text>
  <!-- Arrow down -->
  <line x1="111" y1="36" x2="111" y2="46" stroke="#2D3748" strokeWidth="1.5"/>
  <polygon points="107,46 115,46 111,50" fill="#2D3748"/>
  <!-- Decision diamond -->
  <polygon points="111,50 125,60 111,70 97,60" fill="#FFD93D" stroke="#2D3748" strokeWidth="1"/>
  <text x="111" y="63" textAnchor="middle" fontFamily="monospace" fontSize="6" fill="#0F1333">Trigger?</text>
  <!-- Arrow right (yes) -->
  <line x1="125" y1="60" x2="135" y2="60" stroke="#2D3748" strokeWidth="1.5"/>
  <polygon points="133,57 141,60 133,63" fill="#2D3748"/>
  <!-- Action box right -->
  <rect x="131" y="52" width="14" height="16" rx="3" fill="#4A3AFF"/>
  <text x="138" y="61" textAnchor="middle" fontFamily="monospace" fontSize="5.5" fill="white">Run</text>
  <!-- Arrow down from diamond -->
  <line x1="111" y1="70" x2="111" y2="80" stroke="#2D3748" strokeWidth="1.5"/>
  <polygon points="107,80 115,80 111,84" fill="#2D3748"/>
  <!-- End box -->
  <rect x="97" y="84" width="28" height="14" rx="4" fill="#FF5F57"/>
  <text x="111" y="93" textAnchor="middle" fontFamily="monospace" fontSize="6" fill="white" fontWeight="bold">Done ✓</text>

  <!-- Pip body -->
  <rect x="12" y="58" width="54" height="50" rx="16" fill="#00D4B8"/>
  <rect x="17" y="63" width="24" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>

  <!-- Pip head -->
  <rect x="15" y="22" width="50" height="42" rx="16" fill="#4A3AFF"/>
  <rect x="22" y="26" width="20" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>

  <!-- Eyes — engaged/presenting look -->
  <circle cx="29" cy="40" r="8" fill="#FFD93D"/>
  <circle cx="53" cy="40" r="8" fill="#FFD93D"/>
  <circle cx="31" cy="39" r="3.5" fill="#0F1333"/>
  <circle cx="55" cy="39" r="3.5" fill="#0F1333"/>
  <circle cx="32.5" cy="37.5" r="1.5" fill="white"/>
  <circle cx="56.5" cy="37.5" r="1.5" fill="white"/>

  <!-- Antenna -->
  <rect x="36" y="10" width="4" height="14" rx="2" fill="#4A3AFF"/>
  <circle cx="38" cy="9" r="5" fill="#FFD93D"/>
  <circle cx="38" cy="9" r="2.5" fill="#FF5F57"/>

  <!-- Smile — proud/explaining -->
  <path d="M29 55 Q41 64 53 55" stroke="white" strokeWidth="3" strokeLinecap="round" fill="none"/>

  <!-- Gear badge on chest -->
  <circle cx="39" cy="78" r="6" fill="#0F1333"/>
  <circle cx="39" cy="78" r="3.5" fill="#FFD93D"/>
  <rect x="38" y="71.5" width="2" height="3" rx="0.5" fill="#0F1333"/>
  <rect x="38" y="81.5" width="2" height="3" rx="0.5" fill="#0F1333"/>
  <rect x="32.5" y="77" width="3" height="2" rx="0.5" fill="#0F1333"/>
  <rect x="42.5" y="77" width="3" height="2" rx="0.5" fill="#0F1333"/>

  <!-- Left arm holding board edge -->
  <rect x="60" y="68" width="18" height="8" rx="4" fill="#00D4B8"/>
  <circle cx="78" cy="72" r="5" fill="#4A3AFF"/>

  <!-- Right arm pointing at flowchart with pointer stick -->
  <rect x="3" y="62" width="16" height="7" rx="3.5" fill="#00D4B8" transform="rotate(15 11 65)"/>
  <circle cx="3" cy="64" r="5" fill="#4A3AFF"/>
  <!-- Pointer stick -->
  <line x1="3" y1="60" x2="78" y2="45" stroke="#2D3748" strokeWidth="2" strokeLinecap="round"/>
  <circle cx="79" cy="44" r="3" fill="#FF5F57"/>

  <!-- Legs -->
  <rect x="22" y="102" width="14" height="18" rx="5" fill="#4A3AFF"/>
  <rect x="44" y="102" width="14" height="18" rx="5" fill="#4A3AFF"/>
  <ellipse cx="29" cy="121" rx="9" ry="5" fill="#0F1333"/>
  <ellipse cx="51" cy="121" rx="9" ry="5" fill="#0F1333"/>
</svg>

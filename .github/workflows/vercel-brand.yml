name: Deploy AutoFlow Brand to Vercel

on:
  push:
    branches: [main, master]
    paths:
      - "autoflow-brand/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: autoflow-brand/package-lock.json

      - name: Install dependencies
        working-directory: autoflow-brand
        run: npm ci

      - name: Deploy to Vercel
        id: deploy
        working-directory: autoflow-brand
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          # vercel --yes --prod will create project on first run if no .vercel/project.json
          URL=$(npx vercel --yes --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

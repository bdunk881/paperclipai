name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write   # required for OIDC login to Azure
  packages: write   # push to ghcr.io

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (${{ matrix.service }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ─── Staging deploy ──────────────────────────────────────────────────────────
  # Runs on every push to main, or manual dispatch targeting staging.
  # Dashboard deploys are handled by .github/workflows/vercel.yml.

  deploy-staging:
    name: Deploy → Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    env:
      IMAGE: ghcr.io/${{ github.repository }}-backend:sha-${{ github.sha }}
      RESOURCE_GROUP: rg-autoflow-staging
      CONTAINER_APP: ca-autoflow-staging-backend

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Capture active revision (for rollback)
        id: prev
        run: |
          REV=$(az containerapp revision list \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?properties.active && properties.trafficWeight > \`0\`].name | [0]" \
            --output tsv 2>/dev/null || echo "")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"
          echo "Previous active revision: ${REV:-none}"

      - name: Deploy new image revision
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"

      - name: Health check (rollback on failure)
        run: |
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Polling https://${FQDN}/health ..."
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${FQDN}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/15: HTTP ${STATUS} — retrying in 20s"
            sleep 20
          done

          PREV="${{ steps.prev.outputs.revision }}"
          if [ -n "$PREV" ]; then
            echo "Health check failed — rolling back to ${PREV}"
            az containerapp ingress traffic set \
              --name "$CONTAINER_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --revision-weight "${PREV}=100"
          else
            echo "Health check failed and no previous revision found — manual intervention required"
          fi
          exit 1

  # ─── Production deploy ───────────────────────────────────────────────────────
  # Runs only on version tags (v*), or manual dispatch targeting production.

  deploy-production:
    name: Deploy → Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    env:
      IMAGE: ghcr.io/${{ github.repository }}-backend:sha-${{ github.sha }}
      RESOURCE_GROUP: rg-autoflow-production
      CONTAINER_APP: ca-autoflow-production-backend

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Capture active revision (for rollback)
        id: prev
        run: |
          REV=$(az containerapp revision list \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?properties.active && properties.trafficWeight > \`0\`].name | [0]" \
            --output tsv 2>/dev/null || echo "")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"
          echo "Previous active revision: ${REV:-none}"

      - name: Deploy new image revision
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"

      - name: Health check (rollback on failure)
        run: |
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "Polling https://${FQDN}/health ..."
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${FQDN}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/15: HTTP ${STATUS} — retrying in 20s"
            sleep 20
          done

          PREV="${{ steps.prev.outputs.revision }}"
          if [ -n "$PREV" ]; then
            echo "Health check failed — rolling back to ${PREV}"
            az containerapp ingress traffic set \
              --name "$CONTAINER_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --revision-weight "${PREV}=100"
          else
            echo "Health check failed and no previous revision found — manual intervention required"
          fi
          exit 1

name: Deploy Dashboard to Cloudflare Pages

on:
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-cloudflare-pages.yml"
  push:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: dashboard-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Derive Cloudflare Pages target
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.base_ref }}
          PR_HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            deploy_branch="$PR_HEAD_REF"
            target_branch="$PR_BASE_REF"
          else
            deploy_branch="$REF_NAME"
            target_branch="$REF_NAME"
          fi
          project_name="autoflow-dashboard"
          custom_domain="app.helloautoflow.com"

          if [ "$target_branch" = "dev" ]; then
            project_name="autoflow-dashboard-dev-git"
            custom_domain="dev.app.helloautoflow.com"
          fi

          echo "deploy_branch=$deploy_branch" >> "$GITHUB_OUTPUT"
          echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"
          echo "project_name=$project_name" >> "$GITHUB_OUTPUT"
          echo "custom_domain=$custom_domain" >> "$GITHUB_OUTPUT"

      - name: Pull target secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: auto-flow-va-pt
          env-slug: ${{ steps.target.outputs.target_branch == 'dev' && 'dev' || 'production' }}

      - name: Prepare dashboard deployment environment
        env:
          TARGET_BRANCH: ${{ steps.target.outputs.target_branch }}
        run: |
          set -euo pipefail

          required_vars=(CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID)
          if [[ "$TARGET_BRANCH" == "dev" ]]; then
            required_vars+=(DEV_SUPABASE_URL DEV_SUPABASE_PUBLISHABLE_KEY)
          else
            required_vars+=(PRODUCTION_SUPABASE_URL PRODUCTION_SUPABASE_PUBLISHABLE_KEY)
          fi

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required Infisical secret ${name}"
              exit 1
            fi
          done

          if [[ "$TARGET_BRANCH" == "dev" ]]; then
            echo "VITE_SUPABASE_URL=${DEV_SUPABASE_URL}" >> "$GITHUB_ENV"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=${DEV_SUPABASE_PUBLISHABLE_KEY}" >> "$GITHUB_ENV"
          else
            echo "VITE_SUPABASE_URL=${PRODUCTION_SUPABASE_URL}" >> "$GITHUB_ENV"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=${PRODUCTION_SUPABASE_PUBLISHABLE_KEY}" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: dashboard
        run: |
          set -euo pipefail

          deploy_output="$(npx wrangler@4 pages deploy dist \
            --project-name="${{ steps.target.outputs.project_name }}" \
            --branch="${{ steps.target.outputs.deploy_branch }}" 2>&1)"
          printf '%s\n' "$deploy_output"

          deploy_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -n 1)"
          if [[ -z "$deploy_url" ]]; then
            echo "::error::Cloudflare Pages deploy did not return a deployment URL"
            exit 1
          fi

          echo "deployment-url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Smoke Pages deployment URL
        run: bash ./infra/scripts/cloudflare_pages_smoke.sh dashboard "${{ steps.deploy.outputs.deployment-url }}"

      - name: Smoke dashboard custom domain
        if: ${{ github.event_name != 'pull_request' && steps.target.outputs.custom_domain != '' }}
        env:
          CUSTOM_DOMAIN: ${{ steps.target.outputs.custom_domain }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 12); do
            if bash ./infra/scripts/cloudflare_pages_smoke.sh dashboard "https://${CUSTOM_DOMAIN}"; then
              exit 0
            fi

            if [ "$attempt" -lt 12 ]; then
              echo "Custom domain not ready yet; retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo "::error::Custom domain smoke test failed for https://${CUSTOM_DOMAIN}"
          exit 1

      - name: Summarize deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.pages-deployment-id }}
          DEPLOYMENT_ENVIRONMENT: ${{ steps.deploy.outputs.pages-environment }}
          DEPLOY_BRANCH: ${{ steps.target.outputs.deploy_branch }}
          TARGET_BRANCH: ${{ steps.target.outputs.target_branch }}
          PROJECT_NAME: ${{ steps.target.outputs.project_name }}
          CUSTOM_DOMAIN: ${{ steps.target.outputs.custom_domain }}
        run: |
          {
            echo "## Cloudflare Pages deployment"
            echo
            echo "- Target branch: ${TARGET_BRANCH:-unknown}"
            echo "- Deploy branch: ${DEPLOY_BRANCH:-unknown}"
            echo "- Project: ${PROJECT_NAME:-unknown}"
            echo "- Environment: ${DEPLOYMENT_ENVIRONMENT:-unknown}"
            echo "- Deployment ID: ${DEPLOYMENT_ID:-unknown}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-unavailable}"
            echo "- Alias URL: ${DEPLOYMENT_ALIAS_URL:-unavailable}"
            echo "- Custom domain: ${CUSTOM_DOMAIN:+https://${CUSTOM_DOMAIN}}"
          } >> "$GITHUB_STEP_SUMMARY"

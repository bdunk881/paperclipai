apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: autoflow-production
  labels:
    app: backend
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        environment: production
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: backend
          # Image tag is overwritten by deploy-azure.yml via kubectl set image
          image: autoflowproductionacr.azurecr.io/autoflow-backend:latest
          securityContext:
            capabilities:
              drop:
                - NET_RAW
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
            - name: PORT
              value: "8000"
          envFrom:
            - secretRef:
                name: autoflow-backend-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: autoflow-production
  annotations:
    service.beta.kubernetes.io/azure-dns-label-name: autoflow-production-api
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /health
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer

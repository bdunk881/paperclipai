name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/${{ github.repository }}-backend

jobs:
  deploy:
    name: Build and Deploy Backend Container App
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            DEPLOY_ENV="production"
          else
            DEPLOY_ENV="staging"
          fi

          if [ "$DEPLOY_ENV" = "production" ]; then
            QA_BYPASS_ENABLED="false"
            QA_BYPASS_USERS=""
            EXPECTED_APP_NAME="${{ vars.AZURE_CONTAINER_APP_PRODUCTION_NAME }}"
            EXPECTED_RESOURCE_GROUP="${{ vars.AZURE_CONTAINER_APP_PRODUCTION_RESOURCE_GROUP }}"
            API_HOST="${{ vars.AZURE_PRODUCTION_API_HOST }}"
            if [ -z "$API_HOST" ]; then
              API_HOST="api.helloautoflow.com"
            fi
          else
            QA_BYPASS_ENABLED="true"
            QA_BYPASS_USERS="qa-smoke-user"
            EXPECTED_APP_NAME="${{ vars.AZURE_CONTAINER_APP_STAGING_NAME }}"
            EXPECTED_RESOURCE_GROUP="${{ vars.AZURE_CONTAINER_APP_STAGING_RESOURCE_GROUP }}"
            API_HOST="${{ vars.AZURE_STAGING_API_HOST }}"
          fi

          IMAGE_TAG="${{ env.IMAGE_REPO }}:sha-${{ github.sha }}"

          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "qa_bypass_enabled=$QA_BYPASS_ENABLED" >> "$GITHUB_OUTPUT"
          echo "qa_bypass_users=$QA_BYPASS_USERS" >> "$GITHUB_OUTPUT"
          echo "expected_container_app=$EXPECTED_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "expected_resource_group=$EXPECTED_RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "api_host=$API_HOST" >> "$GITHUB_OUTPUT"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Discover Azure Container App target
        id: discover
        run: |
          set -euo pipefail

          DEPLOY_ENV="${{ steps.target.outputs.deploy_env }}"
          OVERRIDE_APP_NAME="${{ steps.target.outputs.expected_container_app }}"
          OVERRIDE_RESOURCE_GROUP="${{ steps.target.outputs.expected_resource_group }}"
          API_HOST="${{ steps.target.outputs.api_host }}"
          APP_NAME=""
          RESOURCE_GROUP=""

          exact_lookup() {
            local name="$1"
            az containerapp list \
              --query "[?name=='${name}'].resourceGroup | [0]" \
              -o tsv
          }

          if [ -n "$OVERRIDE_APP_NAME" ] && [ -n "$OVERRIDE_RESOURCE_GROUP" ]; then
            echo "Using explicit Container App target from GitHub variables."
            APP_NAME="$OVERRIDE_APP_NAME"
            RESOURCE_GROUP="$OVERRIDE_RESOURCE_GROUP"
          elif [ -n "$API_HOST" ]; then
            echo "Resolving live backend from DNS: $API_HOST"
            CANONICAL_HOST=$(dig +short "$API_HOST" \
              | sed 's/\.$//' \
              | grep 'azurecontainerapps.io$' \
              | head -n1 || true)
            if [ -n "$CANONICAL_HOST" ]; then
              APP_NAME="${CANONICAL_HOST%%.*}"
              RESOURCE_GROUP=$(exact_lookup "$APP_NAME")
              if [ -n "$RESOURCE_GROUP" ]; then
                echo "Resolved $API_HOST -> $CANONICAL_HOST -> $APP_NAME in $RESOURCE_GROUP"
              fi
            fi
          fi

          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            if [ "$DEPLOY_ENV" = "production" ]; then
              NAME_FILTER="prod"
            else
              NAME_FILTER="staging"
            fi

            MATCH_COUNT=$(az containerapp list \
              --query "[?contains(name, 'backend') && contains(name, '${NAME_FILTER}') ] | length(@)" \
              -o tsv)

            if [ "$MATCH_COUNT" = "1" ]; then
              APP_NAME=$(az containerapp list \
                --query "[?contains(name, 'backend') && contains(name, '${NAME_FILTER}') ].name | [0]" \
                -o tsv)
              RESOURCE_GROUP=$(exact_lookup "$APP_NAME")
              echo "Resolved target from Azure inventory: $APP_NAME in $RESOURCE_GROUP"
            fi
          fi

          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            BACKEND_COUNT=$(az containerapp list \
              --query "[?contains(name, 'backend')] | length(@)" \
              -o tsv)

            if [ "$BACKEND_COUNT" = "1" ]; then
              APP_NAME=$(az containerapp list \
                --query "[?contains(name, 'backend')].name | [0]" \
                -o tsv)
              RESOURCE_GROUP=$(exact_lookup "$APP_NAME")
              echo "Falling back to the only backend container app in the subscription: $APP_NAME in $RESOURCE_GROUP"
            fi
          fi

          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "Unable to resolve the Azure Container App target for $DEPLOY_ENV."
            echo "Set AZURE_CONTAINER_APP_${DEPLOY_ENV^^}_NAME and AZURE_CONTAINER_APP_${DEPLOY_ENV^^}_RESOURCE_GROUP, or point AZURE_${DEPLOY_ENV^^}_API_HOST at the live API hostname."
            echo "Available Container Apps:"
            az containerapp list \
              --query "[].{name:name,resourceGroup:resourceGroup,fqdn:properties.latestRevisionFqdn}" \
              -o table
            exit 1
          fi

          az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "{name:name,resourceGroup:resourceGroup,fqdn:properties.latestRevisionFqdn}" \
            -o table

          echo "container_app=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"

      - name: Deploy backend to Azure Container Apps
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ steps.discover.outputs.container_app }}" \
            --resource-group "${{ steps.discover.outputs.resource_group }}" \
            --image "${{ steps.target.outputs.image_tag }}" \
            --set-env-vars \
              QA_AUTH_BYPASS_ENABLED="${{ steps.target.outputs.qa_bypass_enabled }}" \
              QA_AUTH_BYPASS_USER_IDS="${{ steps.target.outputs.qa_bypass_users }}"

      - name: Smoke test backend
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.discover.outputs.container_app }}"
          RG_NAME="${{ steps.discover.outputs.resource_group }}"
          EXPECTED_IMAGE="${{ steps.target.outputs.image_tag }}"
          DEPLOY_ENV="${{ steps.target.outputs.deploy_env }}"

          LATEST_REVISION=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --query 'properties.latestRevisionName' \
            -o tsv)

          echo "Waiting for revision $LATEST_REVISION to become ready"

          for i in $(seq 1 20); do
            LATEST_READY=$(az containerapp show \
              --name "$APP_NAME" \
              --resource-group "$RG_NAME" \
              --query 'properties.latestReadyRevisionName' \
              -o tsv)
            REVISION_FQDN=$(az containerapp show \
              --name "$APP_NAME" \
              --resource-group "$RG_NAME" \
              --query 'properties.latestRevisionFqdn' \
              -o tsv)
            REVISION_IMAGE=$(az containerapp revision show \
              --name "$APP_NAME" \
              --resource-group "$RG_NAME" \
              --revision "$LATEST_REVISION" \
              --query 'properties.template.containers[0].image' \
              -o tsv)

            echo "Attempt $i: latest=$LATEST_REVISION ready=$LATEST_READY fqdn=$REVISION_FQDN"

            if [ "$REVISION_IMAGE" != "$EXPECTED_IMAGE" ]; then
              echo "Revision image mismatch: expected $EXPECTED_IMAGE, got $REVISION_IMAGE"
              exit 1
            fi

            if [ "$LATEST_READY" = "$LATEST_REVISION" ] && [ -n "$REVISION_FQDN" ]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${REVISION_FQDN}/health")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed on latest ready revision (attempt $i)"

                if [ "$DEPLOY_ENV" = "staging" ]; then
                  RUNS_STATUS=$(curl -s -o /tmp/runs.json -w "%{http_code}" \
                    -H "X-User-Id: qa-smoke-user" \
                    "https://${REVISION_FQDN}/api/runs")
                  if [ "$RUNS_STATUS" != "200" ]; then
                    echo "Expected staging QA bypass to return 200 on /api/runs, got $RUNS_STATUS"
                    cat /tmp/runs.json || true
                    exit 1
                  fi
                  echo "Staging QA bypass smoke test passed on /api/runs"

                  LLM_CONFIGS_STATUS=$(curl -s -o /tmp/llm-configs.json -w "%{http_code}" \
                    -H "X-User-Id: qa-smoke-user" \
                    "https://${REVISION_FQDN}/api/llm-configs")
                  if [ "$LLM_CONFIGS_STATUS" != "200" ]; then
                    echo "Expected staging QA bypass to return 200 on /api/llm-configs, got $LLM_CONFIGS_STATUS"
                    cat /tmp/llm-configs.json || true
                    exit 1
                  fi
                  echo "Staging QA bypass smoke test passed on /api/llm-configs"
                else
                  RUNS_STATUS=$(curl -s -o /tmp/runs.json -w "%{http_code}" \
                    "https://${REVISION_FQDN}/api/runs")
                  if [ "$RUNS_STATUS" != "401" ]; then
                    echo "Expected production /api/runs to require auth with 401, got $RUNS_STATUS"
                    cat /tmp/runs.json || true
                    exit 1
                  fi
                  echo "Production auth gate confirmed on /api/runs"

                  LLM_CONFIGS_STATUS=$(curl -s -o /tmp/llm-configs.json -w "%{http_code}" \
                    "https://${REVISION_FQDN}/api/llm-configs")
                  if [ "$LLM_CONFIGS_STATUS" != "401" ]; then
                    echo "Expected production /api/llm-configs to require auth with 401, got $LLM_CONFIGS_STATUS"
                    cat /tmp/llm-configs.json || true
                    exit 1
                  fi
                  echo "Production auth gate confirmed on /api/llm-configs"
                fi

                exit 0
              fi
              echo "Revision is ready but /health returned $STATUS"
            fi

            sleep 15
          done

          echo "Revision failed to become ready"
          az containerapp revision show \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --revision "$LATEST_REVISION"
          az containerapp logs show \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --revision "$LATEST_REVISION" \
            --tail 100 || true
          exit 1

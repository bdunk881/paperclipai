name: publish-cdn

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          test -f VERSION
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Publish to Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          ASSET_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/publish_to_r2.sh
          scripts/publish_to_r2.sh .

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: brand-manifest-${{ steps.version.outputs.version }}
          path: brand-manifest-${{ steps.version.outputs.version }}.json

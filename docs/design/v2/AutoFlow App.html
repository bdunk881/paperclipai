<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AutoFlow — App</title>
<meta name="viewport" content="width=1280"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="pages-extra.jsx"></script>
<script type="text/babel" src="studio.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>

<script type="text/babel" data-screen-label="App">
function App() {
  const params = new URLSearchParams(location.hash.replace(/^#/, ""));
  const [active, setActive] = React.useState(params.get("p") || "home");

  const [agentModal, setAgentModal] = React.useState(null);
  const [missionModal, setMissionModal] = React.useState(null);
  const [ticketModal, setTicketModal] = React.useState(null);
  const [integrationModal, setIntegrationModal] = React.useState(null);
  const [modelModal, setModelModal] = React.useState(null);

  const openModal = React.useCallback((kind, item) => {
    if (kind === "agent") setAgentModal(item);
    else if (kind === "mission") setMissionModal(item);
    else if (kind === "ticket") setTicketModal(item);
    else if (kind === "integration") setIntegrationModal(item);
    else if (kind === "model") setModelModal(item);
  }, []);

  React.useEffect(() => {
    const onHash = () => {
      const p = new URLSearchParams(location.hash.replace(/^#/, "")).get("p") || "home";
      setActive(p);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const nav = (id) => { location.hash = "p=" + id; setActive(id); };

  const Page = {
    home:         AF2_Home,
    missions:     AF2_Missions,
    approvals:    AF2_Approvals,
    team:         AF2_Team,
    hire:         AF2_Hire,
    studio:       AF2_Studio,
    integrations: AF2_Integrations,
    models:       AF2_Models,
    activity:     AF2_Activity,
    budget:       AF2_Budget,
    library:      AF2_Library,
    settings:     AF2_Settings,
  }[active] || AF2_Home;

  return (
    <React.Fragment>
      <window.AF2_App active={active} onNav={nav}>
        <Page openModal={openModal}/>
      </window.AF2_App>
      <AF2_AgentModal agent={agentModal} onClose={() => setAgentModal(null)}/>
      <AF2_MissionModal mission={missionModal} onClose={() => setMissionModal(null)}/>
      <AF2_TicketModal ticket={ticketModal} onClose={() => setTicketModal(null)}/>
      <AF2_IntegrationModal integration={integrationModal} onClose={() => setIntegrationModal(null)}/>
      <AF2_ModelModal vendor={modelModal} onClose={() => setModelModal(null)}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

name: Deploy FastAPI Fly.io Staging

on:
  push:
    branches: [staging]
    paths:
      - "backend/**"
      - "docker/backend/Dockerfile"
      - "fly.toml"
      - "infra/scripts/fly_fastapi_smoke.sh"
      - ".github/workflows/deploy-fly-fastapi-staging.yml"
  workflow_dispatch:

concurrency:
  group: deploy-fly-fastapi-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-backend:
    name: Validate FastAPI backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/test_knowledge_api.py -q

  deploy:
    name: Deploy staging Fly.io app
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: staging
    env:
      FLY_DEPLOY_ENV: staging
      FLY_STAGING_APP_FALLBACK: autoflow-fastapi-staging
      FLY_STAGING_BASE_URL_FALLBACK: https://autoflow-fastapi-staging.fly.dev
      FLY_SHARED_SMOKE_USER_FALLBACK: qa-smoke-user
      FLY_STAGING_ALLOWED_ORIGINS: https://staging.helloautoflow.com,https://staging.app.helloautoflow.com,https://app.helloautoflow.com
    steps:
      - uses: actions/checkout@v5

      - name: Pull production secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal-auth
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: autoflow
          env-slug: production

      - name: Validate staging deployment secrets
        run: |
          set -euo pipefail

          required_vars=(
            FLY_API_TOKEN
            PRODUCTION_SUPABASE_URL
            PRODUCTION_SUPABASE_ANON_KEY
            PRODUCTION_SUPABASE_SERVICE_ROLE_KEY
            PRODUCTION_CONNECTOR_CREDENTIAL_ENCRYPTION_KEY
            PRODUCTION_LLM_CONFIG_ENCRYPTION_KEY
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required Infisical secret ${name}"
              exit 1
            fi
          done

      - name: Resolve Fly deployment settings
        id: settings
        run: |
          set -euo pipefail
          app_name="${{ vars.FLY_STAGING_APP_NAME }}"
          if [[ -z "$app_name" ]]; then
            app_name="${FLY_STAGING_APP_FALLBACK}"
          fi

          base_url="${{ vars.FLY_STAGING_BASE_URL }}"
          if [[ -z "$base_url" ]]; then
            base_url="${FLY_STAGING_BASE_URL_FALLBACK}"
          fi

          smoke_user_id="${{ vars.FLY_STAGING_SMOKE_USER_ID }}"
          if [[ -z "$smoke_user_id" ]]; then
            smoke_user_id="${FLY_SHARED_SMOKE_USER_FALLBACK}"
          fi

          config_path="fly.toml"
          artifact_prefix="fastapi-fly-staging"

          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
          echo "smoke_user_id=$smoke_user_id" >> "$GITHUB_OUTPUT"
          echo "config_path=$config_path" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=$artifact_prefix" >> "$GITHUB_OUTPUT"

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        run: |
          set -euo pipefail
          if flyctl status --app "${{ steps.settings.outputs.app_name }}" >/dev/null 2>&1; then
            exit 0
          fi
          flyctl apps create "${{ steps.settings.outputs.app_name }}"

      - name: Sync staging Infisical Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          set -euo pipefail

          required_vars=(
            INFISICAL_PROJECT_ID
            INFISICAL_TOKEN
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret ${name}"
              exit 1
            fi
          done

          secrets_args=(
            "INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}"
            "INFISICAL_TOKEN=${INFISICAL_TOKEN}"
          )

          flyctl secrets set "${secrets_args[@]}" --app "${{ steps.settings.outputs.app_name }}"

      - name: Deploy FastAPI Fly.io service
        run: |
          flyctl deploy \
            --remote-only \
            --config "${{ steps.settings.outputs.config_path }}" \
            --app "${{ steps.settings.outputs.app_name }}"

      - name: Drain legacy staging Fly secrets
        run: |
          set -euo pipefail

          legacy_secrets=(
            APP_ENV
            ALLOWED_ORIGINS
            AUTH_NATIVE_AUTH_PROXY_ALLOWED_ORIGINS
            SUPABASE_URL
            SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            CONNECTOR_CREDENTIAL_ENCRYPTION_KEY
            LLM_CONFIG_ENCRYPTION_KEY
          )
          existing_names="$(flyctl secrets list --app "${{ steps.settings.outputs.app_name }}" | awk 'NR > 1 {print $1}')"
          secrets_to_unset=()

          for key in "${legacy_secrets[@]}"; do
            if grep -qx "$key" <<< "$existing_names"; then
              secrets_to_unset+=("$key")
            fi
          done

          if (( ${#secrets_to_unset[@]} > 0 )); then
            flyctl secrets unset "${secrets_to_unset[@]}" --app "${{ steps.settings.outputs.app_name }}"
          else
            echo "No legacy Fly secrets found to drain."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Capture Fly target evidence
        run: |
          set -euo pipefail
          OUT_DIR="artifacts/fly-fastapi-smoke"
          mkdir -p "$OUT_DIR"
          flyctl status --app "${{ steps.settings.outputs.app_name }}" | tee "$OUT_DIR/fly-status.txt"
          flyctl ips list --app "${{ steps.settings.outputs.app_name }}" | tee "$OUT_DIR/fly-ips.txt"
          {
            echo "# FastAPI Fly.io DNS-Ready Evidence"
            echo
            echo "- Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Environment: ${FLY_DEPLOY_ENV}"
            echo "- Fly app: ${{ steps.settings.outputs.app_name }}"
            echo "- Stable Fly hostname: ${{ steps.settings.outputs.base_url }}"
            echo "- Runtime secrets: loaded through Infisical at container startup"
            echo "- Allowed origins: ${FLY_STAGING_ALLOWED_ORIGINS}"
            echo
            echo "## Notes"
            echo
            echo "- Staging uses Infisical's staging environment for runtime secrets."
          } > "$OUT_DIR/dns-ready-cutover.md"
 
      - name: Run FastAPI smoke checks
        run: bash infra/scripts/fly_fastapi_smoke.sh
        env:
          FASTAPI_SMOKE_BASE_URL: ${{ steps.settings.outputs.base_url }}
          FASTAPI_SMOKE_USER_ID: ${{ steps.settings.outputs.smoke_user_id }}

      - name: Upload FastAPI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.settings.outputs.artifact_prefix }}-evidence-${{ github.run_id }}
          path: artifacts/fly-fastapi-smoke/
          retention-days: 14

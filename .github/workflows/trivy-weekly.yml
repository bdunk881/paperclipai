name: Weekly Container Image Scan

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  scan:
    name: Trivy Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: docker/backend/Dockerfile
          - service: frontend
            dockerfile: docker/frontend/Dockerfile
          - service: backup
            dockerfile: infra/backup/Dockerfile
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: autoflow-${{ matrix.service }}:weekly

      - name: Scan image for vulnerabilities (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "image"
          image-ref: "autoflow-${{ matrix.service }}:weekly"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

      - name: Print table summary on failure
        if: failure()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "image"
          image-ref: "autoflow-${{ matrix.service }}:weekly"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"

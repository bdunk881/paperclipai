name: Deploy Azure Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options: [plan, apply]
      bootstrap:
        description: Run state backend bootstrap first (one-time only)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: 1a18157f-bc97-4ad1-a170-1ebd3ae93968
  ARM_TENANT_ID: b1cb1311-760a-4c88-a778-5d2c227a1f45
  ARM_SUBSCRIPTION_ID: 776a7226-e364-4cd9-a3e6-d083641af9ea
  ARM_USE_OIDC: true
  TF_VAR_environment: ${{ inputs.environment }}
  TF_VAR_tenant_id: b1cb1311-760a-4c88-a778-5d2c227a1f45
  TF_VAR_autoflow_management_group_name: f4e6c3a4-6ee6-4604-8334-413e481dcf27
  TF_VAR_alert_email: ops@helloautoflow.com

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/azure
    steps:
      - uses: actions/checkout@v5

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Bootstrap state backend
        if: ${{ inputs.bootstrap == true }}
        run: |
          AZURE_SUBSCRIPTION_ID=$ARM_SUBSCRIPTION_ID bash scripts/bootstrap-tfstate.sh

      - name: Discover DevOps SP object ID
        id: sp
        run: |
          SP_OID=$(az ad sp show --id "$ARM_CLIENT_ID" --query id -o tsv)
          echo "devops_sp_object_id=$SP_OID" >> "$GITHUB_OUTPUT"
          echo "DevOps SP Object ID: $SP_OID"

      - name: Ensure management group Reader for Terraform SP
        run: |
          set -euo pipefail

          MG_SCOPE="/providers/Microsoft.Management/managementGroups/$TF_VAR_autoflow_management_group_name"
          SP_OID="${{ steps.sp.outputs.devops_sp_object_id }}"

          EXISTING_ASSIGNMENT=$(az role assignment list \
            --assignee-object-id "$SP_OID" \
            --scope "$MG_SCOPE" \
            --role "Reader" \
            --query "[0].id" \
            -o tsv)

          if [ -n "$EXISTING_ASSIGNMENT" ]; then
            echo "Reader assignment already present at $MG_SCOPE: $EXISTING_ASSIGNMENT"
            exit 0
          fi

          echo "Granting Reader on $MG_SCOPE to service principal object $SP_OID"
          az role assignment create \
            --assignee-object-id "$SP_OID" \
            --assignee-principal-type ServicePrincipal \
            --role "Reader" \
            --scope "$MG_SCOPE" \
            --description "Bootstrap management-group read for Terraform policy refresh"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform init
        run: terraform init -backend-config=backend-config/${{ inputs.environment }}.hcl

      - name: Select Terraform workspace
        if: ${{ inputs.environment == 'production' }}
        run: terraform workspace select production

      - name: Terraform plan
        run: |
          terraform plan \
            -var="devops_sp_object_id=${{ steps.sp.outputs.devops_sp_object_id }}" \
            -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply tfplan

      - name: Show outputs
        if: ${{ inputs.action == 'apply' }}
        run: terraform output -json

  setup-k8s:
    name: Apply K8s Manifests
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ inputs.action == 'apply' }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Discover AKS cluster
        id: aks
        env:
          AKS_CLUSTER_NAME_OVERRIDE: ${{ inputs.environment == 'production' && vars.AZURE_AKS_PRODUCTION_CLUSTER_NAME || vars.AZURE_AKS_STAGING_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP_OVERRIDE: ${{ inputs.environment == 'production' && vars.AZURE_AKS_PRODUCTION_RESOURCE_GROUP || vars.AZURE_AKS_STAGING_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          reject_cross_environment_target() {
            local value="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
            local label="$2"
            local deploy_env="$3"

            if [ "$deploy_env" = "production" ]; then
              if printf '%s' "$value" | grep -Eq 'staging|nonprod'; then
                echo "::error::$label points at a non-production target: $1"
                exit 1
              fi
            else
              if printf '%s' "$value" | grep -Eq 'prod(uction)?' \
                && ! printf '%s' "$value" | grep -Eq 'staging'; then
                echo "::error::$label points at a production target: $1"
                exit 1
              fi
            fi
          }

          AKS_RG="${AKS_RESOURCE_GROUP_OVERRIDE:-}"
          AKS_NAME="${AKS_CLUSTER_NAME_OVERRIDE:-}"

          if [ -z "$AKS_RG" ] || [ -z "$AKS_NAME" ]; then
            NAME_FILTER="${{ inputs.environment }}"
            AKS_RG=$(az aks list --subscription "$ARM_SUBSCRIPTION_ID" --query "[?contains(name, '${NAME_FILTER}')].resourceGroup | [0]" -o tsv)
            AKS_NAME=$(az aks list --subscription "$ARM_SUBSCRIPTION_ID" --query "[?contains(name, '${NAME_FILTER}')].name | [0]" -o tsv)
          fi

          if [ -z "$AKS_RG" ] || [ -z "$AKS_NAME" ]; then
            echo "::error::Unable to resolve the AKS cluster for ${{ inputs.environment }}"
            az aks list --subscription "$ARM_SUBSCRIPTION_ID" --query "[].{name:name,resourceGroup:resourceGroup}" -o table
            exit 1
          fi

          reject_cross_environment_target "$AKS_RG" "AKS resource group" "${{ inputs.environment }}"
          reject_cross_environment_target "$AKS_NAME" "AKS cluster name" "${{ inputs.environment }}"

          echo "rg=$AKS_RG" >> "$GITHUB_OUTPUT"
          echo "name=$AKS_NAME" >> "$GITHUB_OUTPUT"
          echo "AKS: $AKS_NAME in $AKS_RG"

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ steps.aks.outputs.rg }}
          cluster-name: ${{ steps.aks.outputs.name }}
          subscription: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Apply K8s manifests
        run: |
          echo "=== Applying ${{ inputs.environment }} manifests ==="
          kubectl apply -f k8s/${{ inputs.environment }}/namespace.yaml
          kubectl apply -f k8s/${{ inputs.environment }}/
          echo ""
          echo "=== Verifying namespaces ==="
          kubectl get namespaces
          echo ""
          echo "=== Verifying deployments ==="
          kubectl get deployments -n autoflow-${{ inputs.environment }} || echo "No deployments yet (expected on first run)"

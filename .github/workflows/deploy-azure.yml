name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/${{ github.repository }}-backend

jobs:
  deploy:
    name: Build and Deploy Backend Container App
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.environment }}"
          else
            DEPLOY_ENV="staging"
          fi

          if [ "$DEPLOY_ENV" = "production" ]; then
            RG_NAME="rg-autoflow-production"
            APP_NAME="ca-autoflow-production-backend"
          else
            RG_NAME="rg-autoflow-staging"
            APP_NAME="ca-autoflow-staging-backend"
          fi

          IMAGE_TAG="${{ env.IMAGE_REPO }}:sha-${{ github.sha }}"

          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "container_app=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Deploy backend to Azure Container Apps
        id: deploy
        run: |
          set -euo pipefail
          PREVIOUS_READY_REVISION=$(az containerapp show \
            --name "${{ steps.target.outputs.container_app }}" \
            --resource-group "${{ steps.target.outputs.resource_group }}" \
            --query 'properties.latestReadyRevisionName' \
            -o tsv)

          NEW_REVISION=$(az containerapp update \
            --name "${{ steps.target.outputs.container_app }}" \
            --resource-group "${{ steps.target.outputs.resource_group }}" \
            --image "${{ steps.target.outputs.image_tag }}" \
            --query 'properties.latestRevisionName' \
            -o tsv)

          echo "Previous ready revision: ${PREVIOUS_READY_REVISION:-<none>}"
          echo "New revision: $NEW_REVISION"

          echo "previous_ready_revision=$PREVIOUS_READY_REVISION" >> "$GITHUB_OUTPUT"
          echo "new_revision=$NEW_REVISION" >> "$GITHUB_OUTPUT"

      - name: Wait for latest revision readiness
        run: |
          set -euo pipefail

          TARGET_REVISION="${{ steps.deploy.outputs.new_revision }}"
          APP_NAME="${{ steps.target.outputs.container_app }}"
          RESOURCE_GROUP="${{ steps.target.outputs.resource_group }}"

          for i in $(seq 1 40); do
            LATEST_READY_REVISION=$(az containerapp show \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query 'properties.latestReadyRevisionName' \
              -o tsv)

            if [ "$LATEST_READY_REVISION" = "$TARGET_REVISION" ]; then
              echo "Revision $TARGET_REVISION is ready (attempt $i)"
              exit 0
            fi

            echo "Attempt $i: waiting for revision $TARGET_REVISION to become ready; latest ready revision is ${LATEST_READY_REVISION:-<none>}."
            az containerapp revision list \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "[].{name:name,active:properties.active,health:properties.healthState,running:properties.runningState,created:properties.createdTime}" \
              -o table || true
            sleep 15
          done

          echo "Revision $TARGET_REVISION never became latestReadyRevisionName."
          exit 1

      - name: Smoke test latest ready backend revision
        run: |
          set -euo pipefail

          APP_NAME="${{ steps.target.outputs.container_app }}"
          RESOURCE_GROUP="${{ steps.target.outputs.resource_group }}"
          TARGET_REVISION="${{ steps.deploy.outputs.new_revision }}"

          LATEST_READY_REVISION=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query 'properties.latestReadyRevisionName' \
            -o tsv)

          if [ "$LATEST_READY_REVISION" != "$TARGET_REVISION" ]; then
            echo "Latest ready revision $LATEST_READY_REVISION does not match deployed revision $TARGET_REVISION."
            exit 1
          fi

          REVISION_FQDN=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query 'properties.latestRevisionFqdn' \
            -o tsv)
          INGRESS_FQDN=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query 'properties.configuration.ingress.fqdn' \
            -o tsv)

          if [ -n "$REVISION_FQDN" ]; then
            URL="https://${REVISION_FQDN}/health"
          else
            URL="https://${INGRESS_FQDN}/health"
          fi

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed for $TARGET_REVISION via $URL (attempt $i)"
              {
                echo "### Azure backend deploy"
                echo ""
                echo "- Image: \`${{ steps.target.outputs.image_tag }}\`"
                echo "- Revision: \`$TARGET_REVISION\`"
                echo "- Smoke URL: \`$URL\`"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i: got $STATUS from $URL, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed for revision $TARGET_REVISION after 10 attempts"
          exit 1

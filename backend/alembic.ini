# A generic, single database configuration.

[alembic]
# Path to the migration scripts, relative to this file.
script_location = alembic

# Template used when generating migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this directory so imports inside env.py resolve.
prepend_sys_path = .

# Separator character used in the versions directory.
version_path_separator = os

# The database URL is set at runtime from the DATABASE_URL environment
# variable inside alembic/env.py — do not store credentials here.
# sqlalchemy.url = postgresql+asyncpg://user:pass@host/db

[post_write_hooks]
# Uncomment to auto-format generated migration files:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: Cut Over Production API DNS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}

jobs:
  cutover:
    name: Point api.helloautoflow.com at the production AKS ingress
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Validate required production settings
        env:
          AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_PRODUCTION_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_PRODUCTION_RESOURCE_GROUP }}
          API_HOST: ${{ vars.AZURE_PRODUCTION_API_HOST }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          require_nonempty() {
            local value="$1"
            local label="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required value: $label"
              exit 1
            fi
          }

          require_nonempty "${ARM_CLIENT_ID}" "ARM_CLIENT_ID"
          require_nonempty "${ARM_TENANT_ID}" "ARM_TENANT_ID"
          require_nonempty "${ARM_SUBSCRIPTION_ID}" "ARM_SUBSCRIPTION_ID"
          require_nonempty "${AKS_CLUSTER_NAME}" "AZURE_AKS_PRODUCTION_CLUSTER_NAME"
          require_nonempty "${AKS_RESOURCE_GROUP}" "AZURE_AKS_PRODUCTION_RESOURCE_GROUP"
          require_nonempty "${API_HOST}" "AZURE_PRODUCTION_API_HOST"
          require_nonempty "${CLOUDFLARE_API_TOKEN}" "CLOUDFLARE_API_TOKEN"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Resolve production ingress target
        id: ingress
        env:
          AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_PRODUCTION_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_PRODUCTION_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          LOGS="$(
            az aks command invoke \
              --resource-group "${AKS_RESOURCE_GROUP}" \
              --name "${AKS_CLUSTER_NAME}" \
              --command "kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}{\"\\n\"}{.status.loadBalancer.ingress[0].hostname}'" \
              --query logs \
              --output tsv
          )"

          INGRESS_TARGET="$(printf '%s\n' "${LOGS}" | awk 'NF { print; exit }')"
          if [ -z "${INGRESS_TARGET}" ]; then
            echo "::error::Unable to resolve the ingress-nginx public endpoint."
            exit 1
          fi

          echo "target=${INGRESS_TARGET}" >> "${GITHUB_OUTPUT}"
          echo "Resolved production ingress target: ${INGRESS_TARGET}"

      - name: Verify AKS ingress before DNS cutover
        id: ingress_verification
        env:
          API_HOST: ${{ vars.AZURE_PRODUCTION_API_HOST }}
          INGRESS_TARGET: ${{ steps.ingress.outputs.target }}
        run: |
          set -euo pipefail

          HEALTH_STATUS="$(
            curl -ksS \
              --resolve "${API_HOST}:443:${INGRESS_TARGET}" \
              --output /tmp/health.json \
              --write-out "%{http_code}" \
              "https://${API_HOST}/health"
          )"
          if [ "${HEALTH_STATUS}" != "200" ]; then
            echo "::error::Expected ingress /health to return 200, got ${HEALTH_STATUS}"
            cat /tmp/health.json
            exit 1
          fi

          OAUTH_STATUS="$(
            curl -ksS \
              --resolve "${API_HOST}:443:${INGRESS_TARGET}" \
              --request POST \
              --header "Content-Type: application/json" \
              --data '{}' \
              --output /tmp/oauth.json \
              --write-out "%{http_code}" \
              "https://${API_HOST}/api/integrations/apollo/oauth/start"
          )"
          if [ "${OAUTH_STATUS}" != "401" ]; then
            echo "::error::Expected Apollo OAuth start to return 401 through ingress, got ${OAUTH_STATUS}"
            cat /tmp/oauth.json
            exit 1
          fi

          {
            echo "health_status=${HEALTH_STATUS}"
            echo "oauth_status=${OAUTH_STATUS}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upsert Cloudflare DNS record
        id: cloudflare
        env:
          API_HOST: ${{ vars.AZURE_PRODUCTION_API_HOST }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          INGRESS_TARGET: ${{ steps.ingress.outputs.target }}
        run: |
          set -euo pipefail

          zone_name="${API_HOST#*.}"
          if printf '%s' "${INGRESS_TARGET}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            record_type="A"
          else
            record_type="CNAME"
          fi

          zone_id="$(
            curl -fsSL \
              --get \
              --url "https://api.cloudflare.com/client/v4/zones" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data-urlencode "name=${zone_name}" \
              --data-urlencode "status=active" \
              | jq -r '.result[0].id // empty'
          )"
          if [ -z "${zone_id}" ]; then
            echo "::error::Unable to resolve the Cloudflare zone id for ${zone_name}"
            exit 1
          fi

          existing_record_json="$(
            curl -fsSL \
              --get \
              --url "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data-urlencode "name=${API_HOST}" \
              --data-urlencode "per_page=1"
          )"
          existing_record_id="$(printf '%s' "${existing_record_json}" | jq -r '.result[0].id // empty')"
          existing_record_content="$(printf '%s' "${existing_record_json}" | jq -r '.result[0].content // empty')"

          payload="$(
            jq -nc \
              --arg type "${record_type}" \
              --arg name "${API_HOST}" \
              --arg content "${INGRESS_TARGET}" \
              '{type: $type, name: $name, content: $content, ttl: 300, proxied: false}'
          )"

          if [ -n "${existing_record_id}" ]; then
            curl -fsSL \
              --request PUT \
              --url "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records/${existing_record_id}" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "${payload}" >/tmp/cloudflare-response.json
            action="updated"
          else
            curl -fsSL \
              --request POST \
              --url "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "${payload}" >/tmp/cloudflare-response.json
            action="created"
          fi

          record_id="$(jq -r '.result.id // empty' /tmp/cloudflare-response.json)"
          if [ -z "${record_id}" ]; then
            echo "::error::Cloudflare DNS update did not return a record id."
            cat /tmp/cloudflare-response.json
            exit 1
          fi

          {
            echo "zone_id=${zone_id}"
            echo "record_id=${record_id}"
            echo "previous_content=${existing_record_content}"
            echo "action=${action}"
            echo "record_type=${record_type}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify public DNS cutover
        env:
          API_HOST: ${{ vars.AZURE_PRODUCTION_API_HOST }}
          INGRESS_TARGET: ${{ steps.ingress.outputs.target }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            RESOLVED_TARGET="$(dig +short "${API_HOST}" | awk 'NF { print; exit }')"
            if [ "${RESOLVED_TARGET}" = "${INGRESS_TARGET}" ]; then
              break
            fi
            echo "Waiting for public DNS to resolve to ${INGRESS_TARGET} (${attempt}/30); current=${RESOLVED_TARGET:-<empty>}"
            sleep 10
          done

          RESOLVED_TARGET="$(dig +short "${API_HOST}" | awk 'NF { print; exit }')"
          if [ "${RESOLVED_TARGET}" != "${INGRESS_TARGET}" ]; then
            echo "::error::Public DNS still resolves to ${RESOLVED_TARGET:-<empty>} instead of ${INGRESS_TARGET}"
            exit 1
          fi

          PUBLIC_HEALTH_STATUS="$(
            curl -sS \
              --output /tmp/public-health.json \
              --write-out "%{http_code}" \
              "https://${API_HOST}/health"
          )"
          if [ "${PUBLIC_HEALTH_STATUS}" != "200" ]; then
            echo "::error::Expected public /health to return 200, got ${PUBLIC_HEALTH_STATUS}"
            cat /tmp/public-health.json
            exit 1
          fi

          PUBLIC_OAUTH_STATUS="$(
            curl -sS \
              --request POST \
              --header "Content-Type: application/json" \
              --data '{}' \
              --output /tmp/public-oauth.json \
              --write-out "%{http_code}" \
              "https://${API_HOST}/api/integrations/apollo/oauth/start"
          )"
          if [ "${PUBLIC_OAUTH_STATUS}" != "401" ]; then
            echo "::error::Expected public Apollo OAuth start to return 401, got ${PUBLIC_OAUTH_STATUS}"
            cat /tmp/public-oauth.json
            exit 1
          fi

          SAME_ORIGIN_STATUS="$(
            curl -sS \
              --request POST \
              --header "Content-Type: application/json" \
              --data '{}' \
              --output /tmp/app-oauth.json \
              --write-out "%{http_code}" \
              "https://app.helloautoflow.com/api/integrations/apollo/oauth/start"
          )"
          if [ "${SAME_ORIGIN_STATUS}" != "401" ]; then
            echo "::error::Expected app.helloautoflow.com same-origin API rewrite to return 401, got ${SAME_ORIGIN_STATUS}"
            cat /tmp/app-oauth.json
            exit 1
          fi

          {
            echo "### Production API DNS cutover"
            echo
            echo "- Ingress target: \`${INGRESS_TARGET}\`"
            echo "- Public DNS target: \`${RESOLVED_TARGET}\`"
            echo "- AKS ingress /health: \`${{ steps.ingress_verification.outputs.health_status }}\`"
            echo "- Public /health: \`${PUBLIC_HEALTH_STATUS}\`"
            echo "- Public Apollo OAuth start: \`${PUBLIC_OAUTH_STATUS}\`"
            echo "- app.helloautoflow.com rewrite Apollo OAuth start: \`${SAME_ORIGIN_STATUS}\`"
            echo "- Cloudflare action: \`${{ steps.cloudflare.outputs.action }}\`"
            echo "- Previous DNS content: \`${{ steps.cloudflare.outputs.previous_content }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

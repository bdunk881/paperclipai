<svg viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Center to top-left -->
  <line x1="100" y1="80" x2="40" y2="35" stroke="#00D4B8" strokeWidth="2" strokeDasharray="4 3" opacity="0.6"/>
  <!-- Center to top-right -->
  <line x1="100" y1="80" x2="160" y2="35" stroke="#4A3AFF" strokeWidth="2" strokeDasharray="4 3" opacity="0.6"/>
  <!-- Center to bottom-left -->
  <line x1="100" y1="80" x2="40" y2="130" stroke="#FFD93D" strokeWidth="2" strokeDasharray="4 3" opacity="0.6"/>
  <!-- Center to bottom-right -->
  <line x1="100" y1="80" x2="160" y2="130" stroke="#FF5F57" strokeWidth="2" strokeDasharray="4 3" opacity="0.6"/>
  <!-- Center to left -->
  <line x1="100" y1="80" x2="20" y2="80" stroke="#00D4B8" strokeWidth="2" strokeDasharray="4 3" opacity="0.6"/>
  <!-- Center to right -->
  <line x1="100" y1="80" x2="180" y2="80" stroke="#4A3AFF" strokeWidth="2" strokeDasharray="4 3" opacity="0.6"/>
  <!-- Cross connections -->
  <line x1="40" y1="35" x2="160" y2="35" stroke="#2D3748" strokeWidth="1.5" opacity="0.3"/>
  <line x1="40" y1="130" x2="160" y2="130" stroke="#2D3748" strokeWidth="1.5" opacity="0.3"/>
  <line x1="40" y1="35" x2="40" y2="130" stroke="#2D3748" strokeWidth="1.5" opacity="0.3"/>
  <line x1="160" y1="35" x2="160" y2="130" stroke="#2D3748" strokeWidth="1.5" opacity="0.3"/>

  <!-- Flow direction arrows on center lines -->
  <polygon points="130,78 138,75 138,83" fill="#4A3AFF" opacity="0.7"/>
  <polygon points="70,78 62,75 62,83" fill="#00D4B8" opacity="0.7"/>

  <!-- Center hub node -->
  <circle cx="100" cy="80" r="22" fill="#0F1333" stroke="#00D4B8" strokeWidth="2.5"/>
  <circle cx="100" cy="80" r="16" fill="#0F1333"/>
  <!-- Hub gear icon -->
  <circle cx="100" cy="80" r="8" fill="#00D4B8"/>
  <circle cx="100" cy="80" r="4" fill="#0F1333"/>
  <rect x="99" y="70" width="2" height="4" rx="1" fill="#00D4B8"/>
  <rect x="99" y="86" width="2" height="4" rx="1" fill="#00D4B8"/>
  <rect x="89" y="79" width="4" height="2" rx="1" fill="#00D4B8"/>
  <rect x="107" y="79" width="4" height="2" rx="1" fill="#00D4B8"/>

  <!-- Top-left node — Trigger -->
  <circle cx="40" cy="35" r="16" fill="#0F1333" stroke="#FFD93D" strokeWidth="2"/>
  <path d="M34 35 L44 28 L44 42 Z" fill="#FFD93D"/>
  <!-- Label -->
  <text x="40" y="59" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Trigger</text>

  <!-- Top-right node — API -->
  <circle cx="160" cy="35" r="16" fill="#0F1333" stroke="#4A3AFF" strokeWidth="2"/>
  <rect x="152" y="28" width="16" height="14" rx="3" fill="#4A3AFF"/>
  <rect x="155" y="31" width="10" height="2" rx="1" fill="white" opacity="0.8"/>
  <rect x="155" y="35" width="7" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="155" y="39" width="8" height="2" rx="1" fill="white" opacity="0.6"/>
  <text x="160" y="59" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">API</text>

  <!-- Left node — Database -->
  <circle cx="20" cy="80" r="14" fill="#0F1333" stroke="#00D4B8" strokeWidth="2"/>
  <ellipse cx="20" cy="74" rx="8" ry="3" fill="#00D4B8"/>
  <rect x="12" y="74" width="16" height="8" fill="#00D4B8" opacity="0.7"/>
  <ellipse cx="20" cy="82" rx="8" ry="3" fill="#00D4B8"/>

  <!-- Right node — Output -->
  <circle cx="180" cy="80" r="14" fill="#0F1333" stroke="#4A3AFF" strokeWidth="2"/>
  <path d="M173 80 L180 74 L187 80 L180 86 Z" fill="#4A3AFF"/>
  <circle cx="180" cy="80" r="3" fill="#0F1333"/>

  <!-- Bottom-left node — Email -->
  <circle cx="40" cy="130" r="16" fill="#0F1333" stroke="#FF5F57" strokeWidth="2"/>
  <rect x="32" y="124" width="16" height="12" rx="2" fill="#FF5F57"/>
  <path d="M32 124 L40 131 L48 124" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
  <text x="40" y="154" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Notify</text>

  <!-- Bottom-right node — Done/Check -->
  <circle cx="160" cy="130" r="16" fill="#0F1333" stroke="#00D4B8" strokeWidth="2"/>
  <path d="M153 130 L158 136 L168 124" stroke="#00D4B8" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
  <text x="160" y="154" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Done</text>

  <!-- Animated pulse dots on connections -->
  <circle cx="70" cy="57" r="3" fill="#00D4B8" opacity="0.8"/>
  <circle cx="130" cy="57" r="3" fill="#4A3AFF" opacity="0.8"/>
  <circle cx="70" cy="107" r="3" fill="#FFD93D" opacity="0.8"/>
  <circle cx="130" cy="107" r="3" fill="#FF5F57" opacity="0.8"/>
</svg>

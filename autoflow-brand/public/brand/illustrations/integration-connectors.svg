<svg viewBox="0 0 280 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Center AutoFlow hub -->
  <rect x="108" y="44" width="64" height="52" rx="12" fill="#0F1333" stroke="#00D4B8" strokeWidth="2.5"/>
  <circle cx="140" cy="70" r="16" fill="#00D4B8" opacity="0.15"/>
  <circle cx="140" cy="70" r="10" fill="#00D4B8"/>
  <circle cx="140" cy="70" r="5" fill="#0F1333"/>
  <rect x="139" y="62" width="2" height="3" rx="1" fill="#00D4B8"/>
  <rect x="139" y="75" width="2" height="3" rx="1" fill="#00D4B8"/>
  <rect x="133" y="69" width="3" height="2" rx="1" fill="#00D4B8"/>
  <rect x="144" y="69" width="3" height="2" rx="1" fill="#00D4B8"/>
  <text x="140" y="104" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fontWeight="700" fill="#00D4B8">AutoFlow</text>

  <!-- Connection cables -->
  <!-- Left side cables -->
  <path d="M80 40 Q95 40 108 55" stroke="#00D4B8" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>
  <path d="M80 70 L108 70" stroke="#4A3AFF" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>
  <path d="M80 100 Q95 100 108 85" stroke="#FFD93D" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>

  <!-- Right side cables -->
  <path d="M172 55 Q185 40 200 40" stroke="#FF5F57" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>
  <path d="M172 70 L200 70" stroke="#00D4B8" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>
  <path d="M172 85 Q185 100 200 100" stroke="#4A3AFF" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7"/>

  <!-- Connector plugs (small circles at cable ends joining hub) -->
  <circle cx="108" cy="55" r="4" fill="#00D4B8"/>
  <circle cx="108" cy="70" r="4" fill="#4A3AFF"/>
  <circle cx="108" cy="85" r="4" fill="#FFD93D"/>
  <circle cx="172" cy="55" r="4" fill="#FF5F57"/>
  <circle cx="172" cy="70" r="4" fill="#00D4B8"/>
  <circle cx="172" cy="85" r="4" fill="#4A3AFF"/>

  <!-- Left service boxes -->
  <!-- Slack-ish -->
  <rect x="30" y="20" width="50" height="40" rx="8" fill="#0F1333" stroke="#00D4B8" strokeWidth="1.5"/>
  <circle cx="45" cy="35" r="5" fill="#00D4B8"/>
  <circle cx="55" cy="35" r="5" fill="#00D4B8" opacity="0.7"/>
  <circle cx="65" cy="35" r="5" fill="#00D4B8" opacity="0.5"/>
  <rect x="38" y="44" width="24" height="3" rx="1.5" fill="#00D4B8" opacity="0.4"/>
  <text x="55" y="70" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Chat</text>

  <!-- Email -->
  <rect x="30" y="50" width="50" height="40" rx="8" fill="#0F1333" stroke="#4A3AFF" strokeWidth="1.5"/>
  <rect x="38" y="58" width="34" height="24" rx="3" fill="#4A3AFF" opacity="0.8"/>
  <path d="M38 58 L55 71 L72 58" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
  <text x="55" y="100" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Email</text>

  <!-- Webhook -->
  <rect x="30" y="80" width="50" height="40" rx="8" fill="#0F1333" stroke="#FFD93D" strokeWidth="1.5"/>
  <path d="M44 100 L55 88 L66 100 L55 112 Z" fill="#FFD93D" opacity="0.8"/>
  <circle cx="55" cy="100" r="4" fill="#0F1333"/>
  <text x="55" y="130" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Webhook</text>

  <!-- Right service boxes -->
  <!-- Database -->
  <rect x="200" y="20" width="50" height="40" rx="8" fill="#0F1333" stroke="#FF5F57" strokeWidth="1.5"/>
  <ellipse cx="225" cy="33" rx="11" ry="4" fill="#FF5F57"/>
  <rect x="214" y="33" width="22" height="8" fill="#FF5F57" opacity="0.7"/>
  <ellipse cx="225" cy="41" rx="11" ry="4" fill="#FF5F57" opacity="0.9"/>
  <text x="225" y="70" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Database</text>

  <!-- Spreadsheet/Sheets -->
  <rect x="200" y="50" width="50" height="40" rx="8" fill="#0F1333" stroke="#00D4B8" strokeWidth="1.5"/>
  <rect x="208" y="58" width="34" height="24" rx="2" fill="#00D4B8" opacity="0.8"/>
  <line x1="208" y1="65" x2="242" y2="65" stroke="white" strokeWidth="1" opacity="0.6"/>
  <line x1="208" y1="72" x2="242" y2="72" stroke="white" strokeWidth="1" opacity="0.6"/>
  <line x1="221" y1="58" x2="221" y2="82" stroke="white" strokeWidth="1" opacity="0.6"/>
  <text x="225" y="100" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Sheets</text>

  <!-- Zapier/workflow -->
  <rect x="200" y="80" width="50" height="40" rx="8" fill="#0F1333" stroke="#4A3AFF" strokeWidth="1.5"/>
  <path d="M220 106 L225 92 L230 106 L225 100 Z" fill="#4A3AFF"/>
  <path d="M215 96 L229 96 L222 106 Z" fill="#4A3AFF" opacity="0.6"/>
  <text x="225" y="130" textAnchor="middle" fontFamily="sans-serif" fontSize="8" fill="#2D3748" fontWeight="600">Workflow</text>

  <!-- Data flow dots on cables -->
  <circle cx="94" cy="43" r="3" fill="#00D4B8" opacity="0.9"/>
  <circle cx="94" cy="70" r="3" fill="#4A3AFF" opacity="0.9"/>
  <circle cx="94" cy="97" r="3" fill="#FFD93D" opacity="0.9"/>
  <circle cx="186" cy="43" r="3" fill="#FF5F57" opacity="0.9"/>
  <circle cx="186" cy="70" r="3" fill="#00D4B8" opacity="0.9"/>
  <circle cx="186" cy="97" r="3" fill="#4A3AFF" opacity="0.9"/>
</svg>

<svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Santa hat -->
  <!-- Hat brim -->
  <ellipse cx="60" cy="28" rx="30" ry="7" fill="#FF5F57"/>
  <!-- Hat cone -->
  <path d="M35 28 Q50 5 60 2 Q70 5 85 28 Z" fill="#FF5F57"/>
  <!-- Hat white trim stripe -->
  <ellipse cx="60" cy="28" rx="30" ry="7" fill="white"/>
  <!-- Hat pom-pom -->
  <circle cx="60" cy="4" r="6" fill="white"/>

  <!-- Head -->
  <rect x="30" y="22" width="60" height="44" rx="16" fill="#4A3AFF"/>
  <rect x="37" y="26" width="22" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>

  <!-- Rosy cheeks for holiday cheer -->
  <circle cx="40" cy="52" r="6" fill="#FF5F57" opacity="0.4"/>
  <circle cx="80" cy="52" r="6" fill="#FF5F57" opacity="0.4"/>

  <!-- Eyes — happy crinkle squint -->
  <circle cx="46" cy="41" r="8" fill="#FFD93D"/>
  <circle cx="74" cy="41" r="8" fill="#FFD93D"/>
  <circle cx="48" cy="41" r="3.5" fill="#0F1333"/>
  <circle cx="76" cy="41" r="3.5" fill="#0F1333"/>
  <circle cx="49.5" cy="39.5" r="1.5" fill="white"/>
  <circle cx="77.5" cy="39.5" r="1.5" fill="white"/>

  <!-- Big warm smile -->
  <path d="M44 56 Q60 68 76 56" stroke="white" strokeWidth="3" strokeLinecap="round" fill="none"/>
  <line x1="48" y1="60" x2="48" y2="63" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="60" y1="63" x2="60" y2="66" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="72" y1="60" x2="72" y2="63" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>

  <!-- Body with holiday sweater pattern -->
  <rect x="28" y="62" width="64" height="55" rx="18" fill="#00D4B8"/>
  <rect x="33" y="67" width="27" height="16" rx="8" fill="rgba(255,255,255,0.2)"/>

  <!-- Snowflake pattern on body -->
  <text x="60" y="92" textAnchor="middle" fontSize="12" fill="rgba(255,255,255,0.4)">❄</text>
  <text x="40" y="84" textAnchor="middle" fontSize="8" fill="rgba(255,255,255,0.3)">❄</text>
  <text x="80" y="84" textAnchor="middle" fontSize="8" fill="rgba(255,255,255,0.3)">❄</text>

  <!-- Gear badge with holiday star -->
  <circle cx="60" cy="100" r="6" fill="#0F1333"/>
  <circle cx="60" cy="100" r="3.5" fill="#FFD93D"/>
  <rect x="59" y="93.5" width="2" height="3" rx="0.5" fill="#0F1333"/>
  <rect x="59" y="103.5" width="2" height="3" rx="0.5" fill="#0F1333"/>
  <rect x="53.5" y="99" width="3" height="2" rx="0.5" fill="#0F1333"/>
  <rect x="63.5" y="99" width="3" height="2" rx="0.5" fill="#0F1333"/>

  <!-- Arms out wide with gift box and candy cane -->
  <rect x="14" y="72" width="16" height="8" rx="4" fill="#00D4B8"/>
  <circle cx="13" cy="76" r="5" fill="#4A3AFF"/>
  <!-- Gift box in left hand -->
  <rect x="2" y="68" width="14" height="12" rx="2" fill="#FF5F57"/>
  <line x1="9" y1="68" x2="9" y2="80" stroke="#FFD93D" strokeWidth="1.5"/>
  <line x1="2" y1="74" x2="16" y2="74" stroke="#FFD93D" strokeWidth="1.5"/>
  <path d="M6 68 Q9 63 12 68" stroke="#FFD93D" strokeWidth="1.5" strokeLinecap="round" fill="none"/>

  <rect x="90" y="72" width="16" height="8" rx="4" fill="#00D4B8"/>
  <circle cx="107" cy="76" r="5" fill="#4A3AFF"/>
  <!-- Candy cane in right hand -->
  <path d="M114 65 Q120 60 120 70 Q120 78 113 78" stroke="#FF5F57" strokeWidth="4" strokeLinecap="round" fill="none"/>
  <path d="M114 65 Q120 60 120 70 Q120 78 113 78" stroke="white" strokeWidth="2" strokeLinecap="round" strokeDasharray="3 3" fill="none"/>

  <!-- Legs -->
  <rect x="40" y="112" width="14" height="18" rx="5" fill="#4A3AFF"/>
  <rect x="66" y="112" width="14" height="18" rx="5" fill="#4A3AFF"/>
  <ellipse cx="47" cy="131" rx="9" ry="5" fill="#0F1333"/>
  <ellipse cx="73" cy="131" rx="9" ry="5" fill="#0F1333"/>

  <!-- Small floating snowflakes -->
  <circle cx="10" cy="35" r="2" fill="white" opacity="0.7"/>
  <circle cx="110" cy="40" r="2" fill="white" opacity="0.7"/>
  <circle cx="15" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="108" cy="55" r="1.5" fill="white" opacity="0.5"/>
</svg>

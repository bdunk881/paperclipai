name: Vercel Dashboard Status Sync

on:
  repository_dispatch:
    types:
      - vercel.deployment.pending
      - vercel.deployment.ready
      - vercel.deployment.success
      - vercel.deployment.error
      - vercel.deployment.failed
      - vercel.deployment.canceled
      - vercel.deployment.ignored
      - vercel.deployment.skipped

permissions:
  statuses: write
  contents: read

jobs:
  sync-dashboard-status:
    if: |
      github.event.client_payload.project.name == 'dashboard' ||
      github.event.client_payload.project.id == 'prj_Ib88Fvyw0cn2AlNgGiSUa5DMWtuM'
    runs-on: ubuntu-latest
    steps:
      - name: Sync dashboard Vercel status to commit
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_EVENT: ${{ github.event.action }}
          DEPLOYMENT_SHA: ${{ github.event.client_payload.git.sha }}
          DEPLOYMENT_URL: ${{ github.event.client_payload.url }}
          PROJECT_NAME: ${{ github.event.client_payload.project.name }}
        with:
          script: |
            const eventType = process.env.DEPLOYMENT_EVENT;
            const sha = process.env.DEPLOYMENT_SHA;
            const projectName = process.env.PROJECT_NAME || 'dashboard';
            const rawUrl = process.env.DEPLOYMENT_URL || '';

            if (!sha) {
              core.setFailed('repository_dispatch payload did not include git.sha');
              return;
            }

            const stateMap = {
              'vercel.deployment.pending': {
                state: 'pending',
                description: 'Vercel is deploying your app',
              },
              'vercel.deployment.ready': {
                state: 'success',
                description: 'Deployment has completed',
              },
              'vercel.deployment.success': {
                state: 'success',
                description: 'Deployment has completed',
              },
              'vercel.deployment.error': {
                state: 'failure',
                description: 'Deployment failed',
              },
              'vercel.deployment.failed': {
                state: 'failure',
                description: 'Deployment failed',
              },
              'vercel.deployment.canceled': {
                state: 'error',
                description: 'Deployment was canceled',
              },
              'vercel.deployment.ignored': {
                state: 'error',
                description: 'Deployment was ignored',
              },
              'vercel.deployment.skipped': {
                state: 'error',
                description: 'Deployment was skipped',
              },
            };

            const status = stateMap[eventType];
            if (!status) {
              core.setFailed(`Unsupported deployment event: ${eventType}`);
              return;
            }

            const targetUrl = rawUrl.startsWith('http://') || rawUrl.startsWith('https://')
              ? rawUrl
              : rawUrl
                ? `https://${rawUrl}`
                : undefined;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              context: `Vercel – ${projectName}`,
              state: status.state,
              description: status.description,
              target_url: targetUrl,
            });

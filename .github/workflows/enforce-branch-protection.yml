name: Enforce Branch Protection

on:
  workflow_dispatch:
    inputs:
      required_checks:
        description: "Comma-separated CI status check names required on master and staging"
        required: false
        default: "Lint Backend,Lint Frontend,Lint API (TypeScript),Test Backend,Test API (TypeScript),Test Frontend (Dashboard),Build Frontend (Dashboard),Auth Regression Smoke (Playwright),E2E Tests (Dashboard),Docker Build Check"
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  protect:
    name: Require PR Reviews on Default Branches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate admin token
        env:
          GH_TOKEN: ${{ secrets.BRANCH_ADMIN_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing BRANCH_ADMIN_TOKEN secret with repo admin scope"
            exit 1
          fi

      - name: Apply branch protection
        env:
          GH_TOKEN: ${{ secrets.BRANCH_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REQUIRED_CHECKS: ${{ github.event.inputs.required_checks || 'Lint Backend,Lint Frontend,Lint API (TypeScript),Test Backend,Test API (TypeScript),Test Frontend (Dashboard),Build Frontend (Dashboard),Auth Regression Smoke (Playwright),E2E Tests (Dashboard),Docker Build Check' }}
          MASTER_ALLOWED_USERS: bdunk881
          STAGING_ALLOWED_USERS: bdunk881
        run: infra/scripts/enforce_branch_protection.sh

<svg viewBox="0 0 240 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background pipe system -->
  <!-- Main horizontal pipe -->
  <rect x="20" y="52" width="200" height="16" rx="8" fill="#0F1333" opacity="0.6"/>
  <!-- Pipe sheen -->
  <rect x="20" y="54" width="200" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Branch pipes going up and down -->
  <rect x="78" y="20" width="14" height="36" rx="7" fill="#0F1333" opacity="0.6"/>
  <rect x="148" y="64" width="14" height="36" rx="7" fill="#0F1333" opacity="0.6"/>

  <!-- Pipe connectors (circles at joints) -->
  <circle cx="85" cy="60" r="10" fill="#2D3748"/>
  <circle cx="85" cy="60" r="6" fill="#0F1333"/>
  <circle cx="155" cy="60" r="10" fill="#2D3748"/>
  <circle cx="155" cy="60" r="6" fill="#0F1333"/>

  <!-- Source node (left) -->
  <circle cx="20" cy="60" r="18" fill="#0F1333" stroke="#00D4B8" strokeWidth="2.5"/>
  <circle cx="20" cy="60" r="11" fill="#00D4B8" opacity="0.2"/>
  <!-- Data stack icon -->
  <ellipse cx="20" cy="55" rx="7" ry="2.5" fill="#00D4B8"/>
  <rect x="13" y="55" width="14" height="5" fill="#00D4B8" opacity="0.7"/>
  <ellipse cx="20" cy="60" rx="7" ry="2.5" fill="#00D4B8"/>
  <rect x="13" y="60" width="14" height="5" fill="#00D4B8" opacity="0.5"/>
  <ellipse cx="20" cy="65" rx="7" ry="2.5" fill="#00D4B8" opacity="0.7"/>

  <!-- Top branch node -->
  <circle cx="85" cy="20" r="14" fill="#0F1333" stroke="#FFD93D" strokeWidth="2"/>
  <!-- Transform/filter icon -->
  <path d="M78 18 L92 18 L88 26 L82 26 Z" fill="#FFD93D" opacity="0.8"/>
  <line x1="81" y1="22" x2="89" y2="22" stroke="#0F1333" strokeWidth="1.5"/>

  <!-- Bottom branch node -->
  <circle cx="155" cy="100" r="14" fill="#0F1333" stroke="#FF5F57" strokeWidth="2"/>
  <!-- Log/output icon -->
  <rect x="148" y="94" width="14" height="12" rx="2" fill="#FF5F57" opacity="0.8"/>
  <line x1="151" y1="97" x2="159" y2="97" stroke="white" strokeWidth="1.5"/>
  <line x1="151" y1="100" x2="159" y2="100" stroke="white" strokeWidth="1.5"/>
  <line x1="151" y1="103" x2="156" y2="103" stroke="white" strokeWidth="1.5"/>

  <!-- Destination node (right) -->
  <circle cx="220" cy="60" r="18" fill="#0F1333" stroke="#4A3AFF" strokeWidth="2.5"/>
  <!-- Checkmark destination -->
  <path d="M211 60 L217 67 L230 52" stroke="#4A3AFF" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>

  <!-- Data packets flowing through pipes -->
  <!-- Teal packets on main pipe going right -->
  <circle cx="50" cy="60" r="5" fill="#00D4B8"/>
  <circle cx="50" cy="60" r="2" fill="white" opacity="0.5"/>

  <circle cx="115" cy="60" r="5" fill="#00D4B8" opacity="0.8"/>
  <circle cx="115" cy="60" r="2" fill="white" opacity="0.5"/>

  <circle cx="185" cy="60" r="5" fill="#4A3AFF"/>
  <circle cx="185" cy="60" r="2" fill="white" opacity="0.5"/>

  <!-- Yellow packet going up branch -->
  <circle cx="85" cy="40" r="4" fill="#FFD93D"/>

  <!-- Red packet going down branch -->
  <circle cx="155" cy="82" r="4" fill="#FF5F57" opacity="0.9"/>

  <!-- Direction arrows -->
  <polygon points="98,58 105,55 105,63" fill="#00D4B8" opacity="0.8"/>
  <polygon points="168,58 175,55 175,63" fill="#4A3AFF" opacity="0.8"/>
  <!-- Up arrow on branch -->
  <polygon points="83,32 88,32 85.5,26" fill="#FFD93D" opacity="0.8"/>
  <!-- Down arrow on branch -->
  <polygon points="153,75 158,75 155.5,81" fill="#FF5F57" opacity="0.8"/>

  <!-- Speed lines showing velocity -->
  <line x1="25" y1="52" x2="40" y2="52" stroke="#00D4B8" strokeWidth="1" opacity="0.4" strokeLinecap="round"/>
  <line x1="25" y1="68" x2="40" y2="68" stroke="#00D4B8" strokeWidth="1" opacity="0.4" strokeLinecap="round"/>

  <!-- Labels -->
  <text x="20" y="86" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill="#2D3748" fontWeight="600">Source</text>
  <text x="85" y="10" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill="#2D3748" fontWeight="600">Transform</text>
  <text x="155" y="122" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill="#2D3748" fontWeight="600">Log</text>
  <text x="220" y="86" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill="#2D3748" fontWeight="600">Deliver</text>
</svg>

name: Deploy Cloudflare Pages

on:
  push:
    branches: [migration]
    paths:
      - "dashboard/**"
      - "docs/**"
      - "landing/**"
      - "infra/scripts/cloudflare_pages_smoke.sh"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  pull_request:
    branches: [migration]
    paths:
      - "dashboard/**"
      - "docs/**"
      - "landing/**"
      - "infra/scripts/cloudflare_pages_smoke.sh"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ matrix.label }} to Cloudflare Pages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: dashboard
            working_directory: dashboard
            output_directory: dist
            project_name: autoflow-dashboard
            lockfile: dashboard/package-lock.json
          - label: docs
            working_directory: docs
            output_directory: build/client
            project_name: autoflow-docs
            lockfile: docs/package-lock.json
          - label: landing
            working_directory: landing
            output_directory: build/client
            project_name: autoflow-landing
            lockfile: landing/package-lock.json

    steps:
      - uses: actions/checkout@v5

      - name: Pull Cloudflare secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          method: universal-auth
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: autoflow
          env-slug: production

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Install dependencies
        working-directory: ${{ matrix.working_directory }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.working_directory }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        shell: bash
        working-directory: ${{ matrix.working_directory }}
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          branch_name=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            branch_name="$PR_HEAD_REF"
          elif [ "$REF_NAME" != "migration" ]; then
            branch_name="$REF_NAME"
          fi

          extra_args=()
          if [ -n "$branch_name" ]; then
            extra_args+=("--branch=$branch_name")
          fi

          deploy_output="$(npx wrangler@4 pages deploy "${{ matrix.output_directory }}" --project-name="${{ matrix.project_name }}" "${extra_args[@]}" 2>&1)"
          printf '%s\n' "$deploy_output"

          deploy_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -n 1)"
          if [ -z "$deploy_url" ]; then
            echo "::error::Cloudflare Pages deploy did not return a preview or production URL"
            exit 1
          fi

          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployment
        run: bash ./infra/scripts/cloudflare_pages_smoke.sh "${{ matrix.label }}" "${{ steps.deploy.outputs.deploy_url }}"

      - name: Summarize deployment
        run: |
          {
            echo "### ${{ matrix.label }} Cloudflare Pages deployment"
            echo
            echo "- Project: \`${{ matrix.project_name }}\`"
            echo "- URL: ${{ steps.deploy.outputs.deploy_url }}"
            echo "- Event: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

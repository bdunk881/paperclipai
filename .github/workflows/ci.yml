name: CI

on:
  pull_request:
    branches: [master, staging, dev]    # was: [master, main, staging]
  push:
    branches: [master, staging, dev]    # was: [master, main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: mypy .

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  lint-api:
    name: Lint API (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Forbid control_plane_* in customer surfaces
        run: |
          if git grep -lnE 'control_plane_(agent|team|task|execution|heartbeat|spend|budget|audit|company)' \
             -- 'dashboard/' 'landing/'; then
            echo "Customer-facing surface leaked an internal noun — see docs/glossary.md"
            exit 1
          fi

      - name: Guard authenticated /api routes require requireRole(...)  # HEL-69
        run: |
          set -euo pipefail
          # Per HEL-69: every authenticated route mount in src/app.ts must
          # compose `requireRole(...)` after `withWorkspace`/`workspaceResolver`,
          # OR be on the explicit allowlist below with an inline rationale.
          #
          # Allowlist (extended-regex literal — bash compares full mount line):
          #   /api/workspaces  — create-workspace flow runs before any
          #     workspace exists, so role gating happens inside the router.
          ALLOWLIST='app\.use\("/api/workspaces",'

          missing=$(grep -nE 'app\.use\("/api/[^"]+",\s*requireAuth' src/app.ts \
            | grep -v 'requireRole(' \
            | grep -vE "$ALLOWLIST" \
            || true)

          if [[ -n "$missing" ]]; then
            echo "::error::Authenticated /api/* routes are missing requireRole(...):"
            printf '%s\n' "$missing"
            echo
            echo "Add requireRole(...) per HEL-69's role mapping in src/app.ts,"
            echo "or extend the ALLOWLIST in this CI step with an inline rationale."
            exit 1
          fi

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: autoflow
          POSTGRES_PASSWORD: autoflow
          POSTGRES_DB: autoflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://autoflow:autoflow@localhost:5432/autoflow_test
      REDIS_URL: redis://localhost:6379
      ENV: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest --cov=. --cov-report=xml:coverage.xml --cov-fail-under=80 -q
      - name: Upload backend coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: backend/coverage.xml
          disable_search: true
          flags: backend
          fail_ci_if_error: false
          handle_no_reports_found: true

  test-api:
    name: Test API (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload API coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage/lcov.info
          disable_search: true
          flags: api
          fail_ci_if_error: false
          handle_no_reports_found: true
          use_oidc: true

  test-frontend:
    name: Test Frontend (Dashboard)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload dashboard coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: dashboard/coverage/lcov.info
          disable_search: true
          flags: dashboard
          fail_ci_if_error: false
          handle_no_reports_found: true
          use_oidc: true

  build-frontend:
    name: Build Frontend (Dashboard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  auth-regression:
    name: Auth Regression Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [test-frontend, build-frontend]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install Infisical CLI
        # Playwright's webServer directive starts the dashboard via `npm run dev`,
        # which is wrapped with `infisical run --env=dev -- ...` (HEL-39). Without
        # the CLI here, the start command exits 127. Install it before npm ci so
        # the binary is on PATH when Playwright spawns the dev server.
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical
          infisical --version
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Pull dashboard preview secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: auto-flow-va-pt
          env-slug: dev
      - name: Run auth regression smoke tests
        run: npm run e2e:auth-regression
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-auth-regression-report
          path: dashboard/playwright-report/
          retention-days: 7

  e2e:
    name: E2E Tests (Dashboard)
    runs-on: ubuntu-latest
    needs: [test-frontend, build-frontend]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install Infisical CLI
        # Same as auth-regression — npm run dev now wraps with `infisical run`,
        # so the CLI must be on PATH before Playwright starts the dev server.
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical
          infisical --version
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Pull dashboard preview secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: auto-flow-va-pt
          env-slug: dev
      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-api, test-frontend, build-frontend]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

name: Deploy Azure Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options: [plan, apply]
      bootstrap:
        description: Run state backend bootstrap first (one-time only)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: b1cb1311-760a-4c88-a778-5d2c227a1f45
  ARM_SUBSCRIPTION_ID: 776a7226-e364-4cd9-a3e6-d083641af9ea
  ARM_USE_OIDC: true
  TF_VAR_environment: ${{ inputs.environment }}
  TF_VAR_tenant_id: b1cb1311-760a-4c88-a778-5d2c227a1f45
  TF_VAR_alert_email: ops@helloautoflow.com

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/azure
    steps:
      - uses: actions/checkout@v5

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Bootstrap state backend
        if: ${{ inputs.bootstrap == true }}
        run: |
          AZURE_SUBSCRIPTION_ID=$ARM_SUBSCRIPTION_ID bash scripts/bootstrap-tfstate.sh

      - name: Discover DevOps SP object ID
        id: sp
        run: |
          SP_OID=$(az ad sp show --id "$ARM_CLIENT_ID" --query id -o tsv)
          echo "devops_sp_object_id=$SP_OID" >> "$GITHUB_OUTPUT"
          echo "DevOps SP Object ID: $SP_OID"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform init
        run: terraform init -backend-config="backend-config/${{ inputs.environment }}.hcl"

      - name: Terraform plan
        run: |
          terraform plan \
            -var="devops_sp_object_id=${{ steps.sp.outputs.devops_sp_object_id }}" \
            -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply tfplan

      - name: Show outputs
        if: ${{ inputs.action == 'apply' }}
        run: terraform output -json

  setup-k8s:
    name: Apply K8s Manifests
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ inputs.action == 'apply' }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Discover AKS cluster
        id: aks
        run: |
          AKS_RG=$(az aks list --subscription "$ARM_SUBSCRIPTION_ID" --query "[0].resourceGroup" -o tsv)
          AKS_NAME=$(az aks list --subscription "$ARM_SUBSCRIPTION_ID" --query "[0].name" -o tsv)
          echo "rg=$AKS_RG" >> "$GITHUB_OUTPUT"
          echo "name=$AKS_NAME" >> "$GITHUB_OUTPUT"
          echo "AKS: $AKS_NAME in $AKS_RG"

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ steps.aks.outputs.rg }}
          cluster-name: ${{ steps.aks.outputs.name }}
          subscription: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Apply K8s manifests
        run: |
          echo "=== Applying ${{ inputs.environment }} manifests ==="
          kubectl apply -f k8s/${{ inputs.environment }}/
          echo ""
          echo "=== Verifying namespaces ==="
          kubectl get namespaces
          echo ""
          echo "=== Verifying deployments ==="
          kubectl get deployments -n autoflow-${{ inputs.environment }} || echo "No deployments yet (expected on first run)"

name: Register CF Pages custom domains (ALT-2368)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (echo only, no API calls)"
        required: false
        default: "false"

jobs:
  add-domains:
    name: Add custom domains to CF Pages projects
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight - verify token and list Pages projects
        run: |
          echo "=== Listing CF Pages projects (verifies token + account ID) ==="
          RESP=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects")
          echo "$RESP" | jq '{success, errors, project_names: [.result[]?.name]}'
          if [ "$(echo "$RESP" | jq -r '.success')" != "true" ]; then
            echo "FATAL: Cannot list projects. Check CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets."
            exit 1
          fi

      - name: Add app.helloautoflow.com to autoflow-dashboard
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] Would add app.helloautoflow.com to autoflow-dashboard"
            exit 0
          fi
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"app.helloautoflow.com"}' \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/autoflow-dashboard/domains")
          echo "=== Full response ===" && echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          ERR_CODE=$(echo "$RESP" | jq -r '.errors[0].code // empty')
          if [ "$SUCCESS" != "true" ] && [ "$ERR_CODE" != "8000018" ]; then
            echo "FAILED:" && echo "$RESP" | jq '.errors'
            exit 1
          fi
          [ "$ERR_CODE" = "8000018" ] && echo "ALREADY_REGISTERED (idempotent OK)" || echo "OK: $(echo "$RESP" | jq -r '.result.name') status=$(echo "$RESP" | jq -r '.result.status')"

      - name: Add docs.helloautoflow.com to autoflow-docs-git
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] Would add docs.helloautoflow.com to autoflow-docs-git"
            exit 0
          fi
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"docs.helloautoflow.com"}' \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/autoflow-docs-git/domains")
          echo "=== Full response ===" && echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          ERR_CODE=$(echo "$RESP" | jq -r '.errors[0].code // empty')
          if [ "$SUCCESS" != "true" ] && [ "$ERR_CODE" != "8000018" ]; then
            echo "FAILED:" && echo "$RESP" | jq '.errors'
            exit 1
          fi
          [ "$ERR_CODE" = "8000018" ] && echo "ALREADY_REGISTERED (idempotent OK)" || echo "OK: $(echo "$RESP" | jq -r '.result.name') status=$(echo "$RESP" | jq -r '.result.status')"

      - name: Add helloautoflow.com to autoflow-landing
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] Would add helloautoflow.com to autoflow-landing"
            exit 0
          fi
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"helloautoflow.com"}' \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/autoflow-landing/domains")
          echo "=== Full response ===" && echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          ERR_CODE=$(echo "$RESP" | jq -r '.errors[0].code // empty')
          if [ "$SUCCESS" != "true" ] && [ "$ERR_CODE" != "8000018" ]; then
            echo "FAILED:" && echo "$RESP" | jq '.errors'
            exit 1
          fi
          [ "$ERR_CODE" = "8000018" ] && echo "ALREADY_REGISTERED (idempotent OK)" || echo "OK: $(echo "$RESP" | jq -r '.result.name') status=$(echo "$RESP" | jq -r '.result.status')"

      - name: Add www.helloautoflow.com to autoflow-landing
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "[DRY RUN] Would add www.helloautoflow.com to autoflow-landing"
            exit 0
          fi
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"www.helloautoflow.com"}' \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/autoflow-landing/domains")
          echo "=== Full response ===" && echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          ERR_CODE=$(echo "$RESP" | jq -r '.errors[0].code // empty')
          if [ "$SUCCESS" != "true" ] && [ "$ERR_CODE" != "8000018" ]; then
            echo "FAILED:" && echo "$RESP" | jq '.errors'
            exit 1
          fi
          [ "$ERR_CODE" = "8000018" ] && echo "ALREADY_REGISTERED (idempotent OK)" || echo "OK: $(echo "$RESP" | jq -r '.result.name') status=$(echo "$RESP" | jq -r '.result.status')"

      - name: Summary
        run: |
          echo "Custom domain registration complete."
          echo "DNS records already configured:"
          echo "  app.helloautoflow.com   -> autoflow-dashboard.pages.dev"
          echo "  docs.helloautoflow.com  -> autoflow-docs-git.pages.dev"
          echo "  www.helloautoflow.com   -> autoflow-landing.pages.dev"
          echo "  api.dev.helloautoflow.com -> autoflow-fastapi-dev.fly.dev"
          echo ""
          echo "Note: helloautoflow.com root domain DNS update (A->CNAME) requires"
          echo "manual step or separate workflow once Pages domain is verified."

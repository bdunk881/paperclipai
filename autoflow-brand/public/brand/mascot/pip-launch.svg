<svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rocket exhaust flames -->
  <ellipse cx="60" cy="138" rx="8" ry="5" fill="#FFD93D" opacity="0.7"/>
  <ellipse cx="60" cy="133" rx="5" ry="6" fill="#FF5F57" opacity="0.8"/>
  <ellipse cx="60" cy="128" rx="3" ry="4" fill="#FFD93D"/>

  <!-- Body -->
  <rect x="30" y="55" width="60" height="55" rx="18" fill="#00D4B8"/>
  <!-- Body highlight -->
  <rect x="35" y="60" width="25" height="15" rx="8" fill="rgba(255,255,255,0.2)"/>

  <!-- Head -->
  <rect x="33" y="18" width="54" height="42" rx="16" fill="#4A3AFF"/>
  <!-- Head highlight -->
  <rect x="40" y="22" width="20" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>

  <!-- Eyes -->
  <circle cx="47" cy="38" r="8" fill="#FFD93D"/>
  <circle cx="73" cy="38" r="8" fill="#FFD93D"/>
  <!-- Pupils — looking up with excitement -->
  <circle cx="47" cy="35" r="3.5" fill="#0F1333"/>
  <circle cx="73" cy="35" r="3.5" fill="#0F1333"/>
  <!-- Eye shine -->
  <circle cx="48.5" cy="33" r="1.5" fill="white"/>
  <circle cx="74.5" cy="33" r="1.5" fill="white"/>

  <!-- Antenna -->
  <rect x="58" y="8" width="4" height="12" rx="2" fill="#4A3AFF"/>
  <circle cx="60" cy="7" r="5" fill="#FFD93D"/>
  <circle cx="60" cy="7" r="2.5" fill="#FF5F57"/>

  <!-- Big grin / excited smile -->
  <path d="M46 51 Q60 62 74 51" stroke="white" strokeWidth="3" strokeLinecap="round" fill="none"/>
  <line x1="50" y1="55" x2="50" y2="58" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="60" y1="57" x2="60" y2="60" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="70" y1="55" x2="70" y2="58" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>

  <!-- Gear badge -->
  <circle cx="60" cy="82" r="6" fill="#0F1333"/>
  <circle cx="60" cy="82" r="3.5" fill="#FFD93D"/>
  <rect x="59" y="75.5" width="2" height="3" rx="0.5" fill="#0F1333"/>
  <rect x="59" y="85.5" width="2" height="3" rx="0.5" fill="#0F1333"/>
  <rect x="53.5" y="81" width="3" height="2" rx="0.5" fill="#0F1333"/>
  <rect x="63.5" y="81" width="3" height="2" rx="0.5" fill="#0F1333"/>
  <rect x="55.3" y="77.3" width="3" height="2" rx="0.5" fill="#0F1333" transform="rotate(45 56.8 78.3)"/>
  <rect x="61.7" y="77.3" width="3" height="2" rx="0.5" fill="#0F1333" transform="rotate(-45 63.2 78.3)"/>
  <rect x="55.3" y="83.3" width="3" height="2" rx="0.5" fill="#0F1333" transform="rotate(-45 56.8 84.3)"/>
  <rect x="61.7" y="83.3" width="3" height="2" rx="0.5" fill="#0F1333" transform="rotate(45 63.2 84.3)"/>

  <!-- Arms raised up in launch excitement -->
  <rect x="16" y="48" width="16" height="8" rx="4" fill="#00D4B8" transform="rotate(-30 24 52)"/>
  <rect x="88" y="48" width="16" height="8" rx="4" fill="#00D4B8" transform="rotate(30 96 52)"/>
  <circle cx="11" cy="46" r="5" fill="#4A3AFF"/>
  <circle cx="109" cy="46" r="5" fill="#4A3AFF"/>

  <!-- Legs / rocket body base -->
  <rect x="42" y="105" width="14" height="18" rx="5" fill="#4A3AFF"/>
  <rect x="64" y="105" width="14" height="18" rx="5" fill="#4A3AFF"/>

  <!-- Speed stars around Pip -->
  <circle cx="18" cy="70" r="2" fill="#FFD93D" opacity="0.8"/>
  <circle cx="102" cy="65" r="2" fill="#FFD93D" opacity="0.8"/>
  <circle cx="22" cy="95" r="1.5" fill="#00D4B8" opacity="0.7"/>
  <circle cx="98" cy="90" r="1.5" fill="#00D4B8" opacity="0.7"/>

  <!-- Small stars/sparkles -->
  <path d="M15 50 L16.5 47 L18 50 L21 51.5 L18 53 L16.5 56 L15 53 L12 51.5 Z" fill="#FFD93D" opacity="0.9"/>
  <path d="M100 55 L101 53 L102 55 L104 56 L102 57 L101 59 L100 57 L98 56 Z" fill="#FF5F57" opacity="0.9"/>
</svg>

name: QA Integration Evidence

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa-integration-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_USE_MOCK: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pull QA secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          method: universal-auth
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: autoflow
          env-slug: production

      - name: Detect probe availability
        id: probe-gate
        run: |
          mkdir -p artifacts/qa-integration

          if [ -n "${QA_API_BASE_URL}" ] && [ -n "${QA_E2E_BEARER_TOKEN}" ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
            echo "QA probe prerequisites present." > artifacts/qa-integration/summary.txt
            exit 0
          fi

          echo "can_run=false" >> "$GITHUB_OUTPUT"
          cat <<'EOF' > artifacts/qa-integration/summary.txt
          QA smoke probes were skipped because the required secret-backed environment
          variables are not available for this workflow run.
          EOF

      - name: Run QA smoke evidence probes
        if: steps.probe-gate.outputs.can_run == 'true'
        run: bash infra/scripts/qa_integration_smoke.sh

      - name: Upload QA evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-integration-evidence-${{ github.run_id }}
          path: artifacts/qa-integration/
          retention-days: 14

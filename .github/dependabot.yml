version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/dashboard"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Ignore major version bumps - these require manual migration
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # v0.5+ requires ESLint 9/10 and flat config; dashboard is still on ESLint 8.
      - dependency-name: "eslint-plugin-react-refresh"
        versions: [">=0.5.0"]
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/landing"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/docs"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

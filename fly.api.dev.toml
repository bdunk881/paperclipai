# Fly.io config for the TS Express backend, dev environment (HEL-83).
#
# Runs the consolidated AutoFlow API (src/app.ts) deployed via docker/api/Dockerfile.
# Public hostname: dev-api.helloautoflow.com (Cloudflare CNAME to <app>.fly.dev,
# Fly cert allocated separately).
#
# Replaces autoflow-fastapi-dev (which is the relay shim from the aborted
# Phase-3 cutover — see backend/fly-cutover-probe-matrix.md). FastAPI app
# stays running in parallel until HEL-97 cleanup.

app = "autoflow-api-dev"
primary_region = "ord"

[build]
  dockerfile = "docker/api/Dockerfile"

# HEL-106: two processes — the HTTP API and the BullMQ worker.
# Both run from the same Docker image; the worker connects to Upstash Redis
# via REDIS_URL (or UPSTASH_REDIS_URL) injected as a Fly secret.
#
# DASH-29: --import ./dist/instrument.js loads Sentry's SDK BEFORE the
# entry module's other imports resolve. Belt-and-suspenders alongside the
# `import "./instrument"` first-line statements in index.ts / worker.ts.
# Without this, Sentry's express/postgres/http auto-integrations attach
# to already-loaded modules and silently drop captures.
[processes]
  app = "node --require ./dist/instrument.js dist/index.js"
  worker = "node --require ./dist/instrument.js dist/worker.js"

[env]
  ALLOWED_ORIGINS = "https://dev.helloautoflow.com,https://dev.app.helloautoflow.com"
  APP_ENV = "dev"
  INFISICAL_ENV = "dev"
  PORT = "8080"
  NODE_ENV = "production"
  # DASH-38: Sentry tags every event with this value. Without it,
  # instrument.ts falls back to NODE_ENV — which is "production" on Fly
  # (Node prod-mode bundling) — so dev events landed in Sentry's prod
  # project filter and got mixed in with real prod errors. Setting it
  # explicitly here keeps the dev/staging/prod separation we wanted from
  # the DASH-33 Sentry audit.
  SENTRY_ENVIRONMENT = "dev"
  # AUTOFLOW_ALLOW_INMEMORY is intentionally unset — HEL-80 enforces double-locked
  # production safety. The server will fail-fast if Postgres is unreachable.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

# DASH-38: restart-on-failure policy applies to BOTH process groups (app
# and worker) because Fly evaluates `[[restart]]` against any machine
# that has no http_service binding-or one whose service exits.
# Without it the worker stays in `stopped` state forever after a single
# crash — exactly what was observed when worker.ts hit
# "REDIS_URL or UPSTASH_REDIS_URL must be set. Exiting." (DASH-37 fixes
# the underlying Upstash wiring; this policy makes future crashes
# auto-recover instead of silently leaving the queue unprocessed).
[[restart]]
  policy = "on-failure"
  retries = 10

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory = "1024mb"

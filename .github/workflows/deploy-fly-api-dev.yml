name: Deploy TS Express API to Fly (dev)

# HEL-83 — deploys the consolidated AutoFlow Express backend (src/app.ts)
# to the `autoflow-api-dev` Fly app. Runs in parallel with the legacy
# `autoflow-fastapi-dev` deploy until HEL-97 cleanup retires the FastAPI app.
#
# Hostname: dev-api.helloautoflow.com (custom domain on this Fly app).

on:
  push:
    branches: [dev]
    paths:
      - "src/**"
      - "docker/api/**"
      - "fly.api.dev.toml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-fly-api-dev.yml"
      - "infra/scripts/fly_api_smoke.sh"
      - "migrations/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-fly-api-dev
  cancel-in-progress: false

env:
  FLY_APP: autoflow-api-dev
  FLY_REGION: ord

jobs:
  validate:
    name: Validate backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript compile check
        run: npx tsc --noEmit
      - name: Backend unit tests
        run: npx jest --config jest.config.cjs --runInBand --testPathIgnorePatterns="dashboard"
        env:
          AUTOFLOW_ALLOW_INMEMORY: "true"
          NODE_ENV: test

  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v5

      - name: Pull dev secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: auto-flow-va-pt
          env-slug: dev

      - name: Verify required env vars are present
        run: |
          set -euo pipefail
          # FLY_API_TOKEN comes from Infisical's dev env (alongside DATABASE_URL,
          # DEV_SUPABASE_*, etc.). INFISICAL_PROJECT_ID + INFISICAL_TOKEN are
          # OPTIONAL — when present, the Fly app entrypoint can wrap with
          # `infisical run`; when absent, we set every runtime env var directly
          # on the Fly app via `flyctl secrets set` below, bypassing the
          # entrypoint's Infisical layer entirely.
          if [[ -z "${FLY_API_TOKEN:-}" ]]; then
            echo "::error::Missing required secret: FLY_API_TOKEN (should be in Infisical's dev env)"
            exit 1
          fi
          # Critical runtime env vars the Express server reads from process.env.
          # All sourced from Infisical's dev env via the secrets-action step above.
          for v in DATABASE_URL DEV_SUPABASE_URL DEV_SUPABASE_PUBLISHABLE_KEY; do
            if [[ -z "${!v:-}" ]]; then
              echo "::error::Missing required Infisical secret in dev env: $v"
              exit 1
            fi
          done
          # DASH-37: Upstash Redis is optional (the two queue paths are safe no-ops
          # without it — engine/queue.ts falls back to in-process chains,
          # worker.ts refuses to start), but if ANY Upstash var is present we
          # warn when the matching pair isn't complete. The two pairs power
          # different code paths:
          #   - UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN → engine/queue.ts
          #     (workflow queue via REST)
          #   - UPSTASH_REDIS_URL (or REDIS_URL) → BullMQ worker + agent presence
          #     (ioredis TCP). Use the rediss://… "TCP" / "Endpoint" URL from
          #     the Upstash console, NOT the REST URL — they're different.
          if [[ -n "${UPSTASH_REDIS_REST_URL:-}" && -z "${UPSTASH_REDIS_REST_TOKEN:-}" ]]; then
            echo "::warning::UPSTASH_REDIS_REST_URL is set in Infisical but UPSTASH_REDIS_REST_TOKEN is missing — engine/queue.ts will fall back to in-process chains."
          fi
          if [[ -n "${UPSTASH_REDIS_REST_TOKEN:-}" && -z "${UPSTASH_REDIS_REST_URL:-}" ]]; then
            echo "::warning::UPSTASH_REDIS_REST_TOKEN is set in Infisical but UPSTASH_REDIS_REST_URL is missing — engine/queue.ts will fall back to in-process chains."
          fi
          if [[ -z "${UPSTASH_REDIS_URL:-}" && -z "${REDIS_URL:-}" ]]; then
            echo "::warning::Neither UPSTASH_REDIS_URL nor REDIS_URL is in Infisical's dev env — the BullMQ worker process will exit on boot and agent presence will be a no-op. Add the TCP/rediss:// endpoint to Infisical to enable durable runs."
          fi
          echo "[verify] Upstash REST URL present: $([ -n "${UPSTASH_REDIS_REST_URL:-}" ] && echo yes || echo no)"
          echo "[verify] Upstash REST token present: $([ -n "${UPSTASH_REDIS_REST_TOKEN:-}" ] && echo yes || echo no)"
          echo "[verify] Upstash TCP URL present: $([ -n "${UPSTASH_REDIS_URL:-}" ] && echo yes || echo no)"
          echo "[verify] Legacy REDIS_URL present: $([ -n "${REDIS_URL:-}" ] && echo yes || echo no)"

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # Use `flyctl status` for the existence probe — exits 0 when the app
          # exists, non-zero otherwise. The previous grep against `flyctl apps
          # list` output didn't match Fly's table layout and tried to recreate
          # an already-existing app ("Name has already been taken").
          if flyctl status -a "${FLY_APP}" >/dev/null 2>&1; then
            echo "Fly app ${FLY_APP} already exists; skipping create."
          else
            echo "Creating Fly app ${FLY_APP}"
            flyctl apps create "${FLY_APP}" --org personal
          fi

      - name: Sync Fly machine-level runtime secrets from Infisical
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # Copy every runtime env var from the Infisical-pulled $GITHUB_ENV onto
          # the Fly machine. The Express server reads these from process.env at
          # startup. Rotation = a new deploy (acceptable for now; we'll
          # reintroduce runtime Infisical wrapping when INFISICAL_PROJECT_ID +
          # INFISICAL_TOKEN are set in the Infisical dev env).
          args=()
          # Map the Infisical names → runtime env names the app expects:
          args+=( "DATABASE_URL=${DATABASE_URL}" )
          args+=( "SUPABASE_URL=${DEV_SUPABASE_URL}" )
          args+=( "SUPABASE_PUBLISHABLE_KEY=${DEV_SUPABASE_PUBLISHABLE_KEY}" )
          [[ -n "${DEV_SUPABASE_SECRET_KEY:-}" ]] && args+=( "SUPABASE_SECRET_KEY=${DEV_SUPABASE_SECRET_KEY}" )
          [[ -n "${DATABASE_URL_UNPOOLED:-}" ]] && args+=( "DATABASE_URL_UNPOOLED=${DATABASE_URL_UNPOOLED}" )
          [[ -n "${SENTRY_DSN:-}" ]] && args+=( "SENTRY_DSN=${SENTRY_DSN}" )
          [[ -n "${GOOGLE_CLIENT_ID:-}" ]] && args+=( "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" )
          [[ -n "${GOOGLE_CLIENT_SECRET:-}" ]] && args+=( "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" )
          [[ -n "${GITHUB_CLIENT_ID:-}" ]] && args+=( "GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}" )
          [[ -n "${GITHUB_CLIENT_SECRET:-}" ]] && args+=( "GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}" )
          # DASH-37: Upstash Redis — forward whichever Upstash names are present
          # in Infisical's dev env. The two pairs power separate code paths
          # (engine/queue.ts uses REST; worker.ts + agent presence use TCP).
          [[ -n "${UPSTASH_REDIS_REST_URL:-}" ]] && args+=( "UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}" )
          [[ -n "${UPSTASH_REDIS_REST_TOKEN:-}" ]] && args+=( "UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}" )
          [[ -n "${UPSTASH_REDIS_URL:-}" ]] && args+=( "UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}" )
          [[ -n "${REDIS_URL:-}" ]] && args+=( "REDIS_URL=${REDIS_URL}" )

          flyctl secrets set "${args[@]}" --app "${FLY_APP}" --stage

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.api.dev.toml \
            --remote-only \
            --build-arg BUILD_SHA="${{ github.sha }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Smoke test
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          bash infra/scripts/fly_api_smoke.sh "https://${FLY_APP}.fly.dev"

      - name: Summarize
        run: |
          {
            echo "## Deploy: ${FLY_APP}"
            echo
            echo "- Region: ${FLY_REGION}"
            echo "- Health: $(curl -s -o /dev/null -w '%{http_code}' https://${FLY_APP}.fly.dev/health)"
            echo "- Custom domain: https://dev-api.helloautoflow.com"
          } >> "$GITHUB_STEP_SUMMARY"

name: Populate Key Vault Secrets

# One-time / on-demand workflow for loading secrets into Azure Key Vault that
# cannot be auto-generated by Terraform (Stripe keys, encryption key, etc.).
# Terraform already writes DATABASE_URL and REDIS_URL from resource outputs.
#
# Run this once per environment (staging → production) before the first deploy.
# Secret values are passed as workflow inputs, masked in logs, and written
# directly to KV via the GitHub Actions OIDC identity (which has Set permission).
#
# Usage: Actions → "Populate Key Vault Secrets" → Run workflow → choose env,
#        fill in the secret values, click Run.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

      stripe_secret_key:
        description: "Stripe live secret key (sk_live_...)"
        required: true
        type: string

      stripe_webhook_secret:
        description: "Stripe webhook signing secret (whsec_...)"
        required: true
        type: string

      stripe_flow_price_id:
        description: "Stripe Flow plan price ID (price_...)"
        required: true
        type: string

      stripe_automate_price_id:
        description: "Stripe Automate plan price ID (price_...)"
        required: true
        type: string

      stripe_scale_price_id:
        description: "Stripe Scale plan price ID (price_...)"
        required: true
        type: string

      llm_config_encryption_key:
        description: "LLM config encryption key (32+ char random string for AES-256-GCM)"
        required: true
        type: string

      entra_client_secret:
        description: "Entra External ID app client secret (leave blank to skip)"
        required: false
        type: string

permissions:
  id-token: write   # required for OIDC token exchange with Azure
  contents: read

jobs:
  populate-keyvault:
    name: Write secrets to ${{ inputs.environment }} Key Vault
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      KV_NAME: kv-autoflow-${{ inputs.environment }}

    steps:
      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Write stripe-secret-key
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "stripe-secret-key" \
            --value "${{ inputs.stripe_secret_key }}" \
            --output none

      - name: Write stripe-webhook-secret
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "stripe-webhook-secret" \
            --value "${{ inputs.stripe_webhook_secret }}" \
            --output none

      - name: Write stripe-flow-price-id
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "stripe-flow-price-id" \
            --value "${{ inputs.stripe_flow_price_id }}" \
            --output none

      - name: Write stripe-automate-price-id
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "stripe-automate-price-id" \
            --value "${{ inputs.stripe_automate_price_id }}" \
            --output none

      - name: Write stripe-scale-price-id
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "stripe-scale-price-id" \
            --value "${{ inputs.stripe_scale_price_id }}" \
            --output none

      - name: Write llm-config-encryption-key
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "llm-config-encryption-key" \
            --value "${{ inputs.llm_config_encryption_key }}" \
            --output none

      - name: Write entra-client-secret
        if: inputs.entra_client_secret != ''
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "entra-client-secret" \
            --value "${{ inputs.entra_client_secret }}" \
            --output none

      - name: List populated secrets (names only)
        run: |
          echo "Secrets now in $KV_NAME:"
          az keyvault secret list --vault-name "$KV_NAME" --query "[].name" -o tsv

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none" role="img" aria-label="AutoFlow">
  <!-- AF2 mark: rounded ink square with two interlocking curves in paper.
       Mirrors docs/design/v2/shell.jsx::AF2_Mark; sized 32 inside a 40
       tall viewBox so the lockup reads at h-8 (32px) without crowding. -->
  <g transform="translate(4 4)">
    <rect width="32" height="32" rx="7" fill="#1a1410" />
    <path d="M9 11.5a4.5 4.5 0 0 1 9 0v9a4.5 4.5 0 0 1-9 0M14 11.5a4.5 4.5 0 0 1 9 0v9" fill="none" stroke="#f6f1e7" stroke-width="2.2" stroke-linecap="round" />
  </g>
  <!-- Serif wordmark in af2-ink. Fraunces is loaded as a webfont in
       index.css but won't resolve inside an <img>-rendered SVG; the
       Georgia / serif fallback keeps the editorial feel without
       reflowing the lockup. fill="currentColor" lets the parent set
       the colour if it ever swaps onto a dark surface. -->
  <text x="46" y="28" font-family="Fraunces, 'Source Serif 4', Georgia, serif" font-size="22" font-weight="500" letter-spacing="-0.4" fill="#1a1410">
    AutoFlow
  </text>
</svg>

app = "autoflow-fastapi-staging"
primary_region = "ord"

[build]
  dockerfile = "docker/backend/Dockerfile"

[env]
  ALLOWED_ORIGINS = "https://staging.helloautoflow.com,https://staging.app.helloautoflow.com,https://app.helloautoflow.com"
  APP_ENV = "staging"
  AUTH_NATIVE_AUTH_PROXY_ALLOWED_ORIGINS = "https://staging.helloautoflow.com,https://staging.app.helloautoflow.com,https://app.helloautoflow.com"
  FASTAPI_EDGE_RELAY_BASE_URL = "https://staging-api.helloautoflow.com"
  INFISICAL_ENV = "staging"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory = "1024mb"

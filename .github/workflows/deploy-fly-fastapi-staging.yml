name: Deploy FastAPI Fly.io Staging

on:
  push:
    branches: [staging]
    paths:
      - "backend/**"
      - "docker/backend/Dockerfile"
      - "fly.toml"
      - "infra/scripts/fly_fastapi_smoke.sh"
      - ".github/workflows/deploy-fly-fastapi-staging.yml"
  workflow_dispatch:

concurrency:
  group: deploy-fly-fastapi-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-backend:
    name: Validate FastAPI backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/test_knowledge_api.py -q

  deploy:
    name: Deploy Fly.io staging app
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: staging
    env:
      FASTAPI_FLY_APP: ${{ vars.FLY_STAGING_APP_NAME != '' && vars.FLY_STAGING_APP_NAME || 'autoflow-fastapi-staging' }}
      FASTAPI_FLY_BASE_URL: ${{ vars.FLY_STAGING_BASE_URL != '' && vars.FLY_STAGING_BASE_URL || 'https://autoflow-fastapi-staging.fly.dev' }}
      FASTAPI_SMOKE_USER_ID: ${{ vars.FLY_STAGING_SMOKE_USER_ID != '' && vars.FLY_STAGING_SMOKE_USER_ID || 'qa-smoke-user' }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy FastAPI staging service
        run: flyctl deploy --remote-only --config fly.toml --app "$FASTAPI_FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify Fly app status
        run: flyctl status --app "$FASTAPI_FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run FastAPI staging smoke checks
        run: bash infra/scripts/fly_fastapi_smoke.sh
        env:
          FASTAPI_SMOKE_BASE_URL: ${{ env.FASTAPI_FLY_BASE_URL }}
          FASTAPI_SMOKE_USER_ID: ${{ env.FASTAPI_SMOKE_USER_ID }}

      - name: Upload FastAPI smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-fly-staging-evidence-${{ github.run_id }}
          path: artifacts/fly-fastapi-smoke/
          retention-days: 14

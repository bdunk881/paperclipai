# AutoFlow Azure DevOps CI/CD Pipeline
#
# Stages:
#   1. Build   — lint, test, Docker build & push to ACR
#   2. Staging — deploy to AKS staging namespace (auto on main merge)
#   3. Prod    — manual approval gate + deploy to AKS production namespace
#
# Prerequisites (set in Azure DevOps → Pipelines → Library):
#   Variable group: autoflow-pipeline-vars
#     ACR_NAME              — e.g. autoflowstagingacr
#     AKS_CLUSTER_NAME      — e.g. autoflow-staging-aks
#     AKS_RESOURCE_GROUP    — e.g. autoflow-staging-rg
#     AZURE_SUBSCRIPTION_ID — your subscription GUID
#
# Service connections (Azure DevOps → Project Settings → Service connections):
#   autoflow-azure-sc     — Azure Resource Manager, scope = subscription
#   autoflow-acr-sc       — Docker Registry pointing at ACR

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main
  paths:
    include:
      - backend/**
      - landing/**
      - docker/**
      - .azure-pipelines/**

variables:
  - group: autoflow-pipeline-vars
  - name: IMAGE_TAG
    value: $(Build.SourceVersion)
  - name: STAGING_NAMESPACE
    value: autoflow-staging
  - name: PROD_NAMESPACE
    value: autoflow-production

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Build
# ─────────────────────────────────────────────────────────────────────────────
stages:
- stage: Build
  displayName: 'Build & Push Images'
  jobs:

  - job: Lint
    displayName: 'Lint & Test'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npm run lint
      displayName: 'ESLint'
      continueOnError: false

    - script: npm test -- --ci --coverage
      displayName: 'Unit tests + coverage'
      env:
        CI: true

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/jest-results.xml'
        failTaskOnFailedTests: true

    - task: PublishCodeCoverageResults@1
      condition: always()
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '**/coverage/cobertura-coverage.xml'

  - job: BuildBackend
    displayName: 'Build Backend Image'
    dependsOn: Lint
    pool:
      vmImage: 'ubuntu-latest'
    condition: succeeded()
    steps:
    - task: Docker@2
      displayName: 'Build & push backend'
      inputs:
        command: buildAndPush
        containerRegistry: 'autoflow-acr-sc'
        repository: 'autoflow-backend'
        dockerfile: 'docker/backend/Dockerfile'
        buildContext: '.'
        tags: |
          $(IMAGE_TAG)
          latest

  - job: BuildFrontend
    displayName: 'Build Frontend Image'
    dependsOn: Lint
    pool:
      vmImage: 'ubuntu-latest'
    condition: succeeded()
    steps:
    - task: Docker@2
      displayName: 'Build & push frontend'
      inputs:
        command: buildAndPush
        containerRegistry: 'autoflow-acr-sc'
        repository: 'autoflow-frontend'
        dockerfile: 'docker/frontend/Dockerfile'
        buildContext: '.'
        tags: |
          $(IMAGE_TAG)
          latest

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Deploy Staging
# ─────────────────────────────────────────────────────────────────────────────
- stage: DeployStaging
  displayName: 'Deploy to Staging'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
    - name: ENVIRONMENT
      value: staging

  jobs:
  - deployment: DeployToStaging
    displayName: 'AKS Staging Deploy'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'autoflow-staging'   # Azure DevOps Environment (no approval gate here)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Set AKS credentials'
            inputs:
              azureSubscription: 'autoflow-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(AKS_RESOURCE_GROUP) \
                  --name $(AKS_CLUSTER_NAME) \
                  --overwrite-existing

          - task: AzureCLI@2
            displayName: 'Deploy backend to staging'
            inputs:
              azureSubscription: 'autoflow-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                kubectl set image deployment/backend \
                  backend=$(ACR_NAME).azurecr.io/autoflow-backend:$(IMAGE_TAG) \
                  -n $(STAGING_NAMESPACE)
                kubectl rollout status deployment/backend -n $(STAGING_NAMESPACE) --timeout=5m

          - task: AzureCLI@2
            displayName: 'Deploy frontend to staging'
            inputs:
              azureSubscription: 'autoflow-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                kubectl set image deployment/frontend \
                  frontend=$(ACR_NAME).azurecr.io/autoflow-frontend:$(IMAGE_TAG) \
                  -n $(STAGING_NAMESPACE)
                kubectl rollout status deployment/frontend -n $(STAGING_NAMESPACE) --timeout=5m

          - script: |
              sleep 20
              for i in $(seq 1 10); do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.helloautoflow.com/health)
                if [ "$STATUS" = "200" ]; then
                  echo "Staging smoke test passed (attempt $i)"
                  exit 0
                fi
                echo "Attempt $i: got $STATUS, retrying in 15s..."
                sleep 15
              done
              echo "Staging smoke test failed"
              exit 1
            displayName: 'Smoke test staging'

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy Production  (manual approval gate)
# ─────────────────────────────────────────────────────────────────────────────
- stage: DeployProduction
  displayName: 'Deploy to Production'
  dependsOn: DeployStaging
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
    - name: ENVIRONMENT
      value: production

  jobs:
  - deployment: DeployToProduction
    displayName: 'AKS Production Deploy'
    pool:
      vmImage: 'ubuntu-latest'
    # ⬇ The "autoflow-production" environment has an Approvals & Checks policy
    # configured in Azure DevOps — this is the manual approval gate.
    environment: 'autoflow-production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Set AKS credentials (production)'
            inputs:
              azureSubscription: 'autoflow-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(AKS_RESOURCE_GROUP)-production \
                  --name $(AKS_CLUSTER_NAME)-production \
                  --overwrite-existing

          - task: AzureCLI@2
            displayName: 'Deploy backend to production'
            inputs:
              azureSubscription: 'autoflow-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                kubectl set image deployment/backend \
                  backend=$(ACR_NAME).azurecr.io/autoflow-backend:$(IMAGE_TAG) \
                  -n $(PROD_NAMESPACE)
                kubectl rollout status deployment/backend -n $(PROD_NAMESPACE) --timeout=10m

          - task: AzureCLI@2
            displayName: 'Deploy frontend to production'
            inputs:
              azureSubscription: 'autoflow-azure-sc'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                kubectl set image deployment/frontend \
                  frontend=$(ACR_NAME).azurecr.io/autoflow-frontend:$(IMAGE_TAG) \
                  -n $(PROD_NAMESPACE)
                kubectl rollout status deployment/frontend -n $(PROD_NAMESPACE) --timeout=10m

          - script: |
              sleep 30
              for i in $(seq 1 10); do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://helloautoflow.com/health)
                if [ "$STATUS" = "200" ]; then
                  echo "Production health check passed (attempt $i)"
                  exit 0
                fi
                echo "Attempt $i: got $STATUS, retrying in 15s..."
                sleep 15
              done
              echo "Production health check failed"
              exit 1
            displayName: 'Verify production health'

name: Observability Rollups

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: observability-rollups
  cancel-in-progress: false

jobs:
  rollups:
    name: Refresh rollups and retention
    runs-on: ubuntu-latest
    env:
      OBS_FUTURE_PARTITION_DAYS: ${{ vars.OBS_FUTURE_PARTITION_DAYS }}
      OBS_ROLLUP_LOOKBACK_HOURS: ${{ vars.OBS_ROLLUP_LOOKBACK_HOURS }}
      OBS_RAW_RETENTION_DAYS: ${{ vars.OBS_RAW_RETENTION_DAYS }}
      OBS_15M_RETENTION_DAYS: ${{ vars.OBS_15M_RETENTION_DAYS }}
      OBS_DAILY_RETENTION_DAYS: ${{ vars.OBS_DAILY_RETENTION_DAYS }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull observability secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal-auth
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: autoflow
          env-slug: production

      - name: Validate observability secrets
        run: |
          set -euo pipefail
          if [[ -z "${OBSERVABILITY_DATABASE_URL:-}" ]]; then
            echo "::error::Missing required Infisical secret OBSERVABILITY_DATABASE_URL"
            exit 1
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run observability maintenance
        run: |
          chmod +x infra/scripts/run_observability_rollups.sh
          infra/scripts/run_observability_rollups.sh | tee observability-rollups.log

      - name: Upload maintenance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-rollups-log
          path: observability-rollups.log
          retention-days: 14

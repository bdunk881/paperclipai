name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
      - ".github/workflows/azure-swa.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "dashboard/**"
  workflow_dispatch:

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build and Deploy Dashboard
    runs-on: ubuntu-latest
    # Skip build/deploy on PR close — only run the close action
    if: github.event_name != 'pull_request' || github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type-check
        working-directory: dashboard
        run: npm run type-check

      - name: Build dashboard
        working-directory: dashboard
        env:
          # CI= (empty) prevents treating ESLint warnings as errors during build
          CI:
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_SUBDOMAIN: ${{ secrets.VITE_AZURE_TENANT_SUBDOMAIN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /dashboard
          output_location: dist
          # Skip the SWA-managed build — we built above with custom env vars
          skip_app_build: true

  close_pr_environment:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close staging environment
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          app_location: /dashboard

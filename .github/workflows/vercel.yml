name: Deploy Landing Page to Vercel

on:
  push:
    branches: [main, master]
    paths:
      - "landing/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Landing Page to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Deploy to Vercel
        id: deploy
        working-directory: landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          URL=$(npx vercel deploy --prod --token=$VERCEL_TOKEN | tail -n 1 | tr -d '\r')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Smoke test landing routes
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail

          ROUTES=(
            "/"
            "/demo"
            "/blog"
            "/privacy"
            "/terms"
            "/signup"
            "/robots.txt"
            "/sitemap.xml"
          )

          for route in "${ROUTES[@]}"; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" "${DEPLOY_URL}${route}")
            if [ "$status" != "200" ]; then
              echo "::error::Route ${route} returned ${status} on ${DEPLOY_URL}"
              exit 1
            fi
            echo "OK ${route} -> ${status}"
          done

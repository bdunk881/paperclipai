apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: autoflow-staging
  labels:
    app: backend
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        environment: staging
    spec:
      containers:
        - name: backend
          # Image tag is overwritten by deploy-azure.yml via kubectl set image
          image: autoflowacr.azurecr.io/autoflow-backend:latest
          securityContext:
            capabilities:
              drop:
                - NET_RAW
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: staging
            - name: PORT
              value: "8000"
          envFrom:
            - secretRef:
                name: autoflow-backend-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: autoflow-staging
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

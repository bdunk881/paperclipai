app = "autoflow-fastapi-staging"
primary_region = "ord"

[build]
  dockerfile = "docker/backend/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory = "1024mb"

name: Deploy Backend to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  IMAGE_REPO: ghcr.io/${{ github.repository }}-backend

jobs:
  deploy-staging:
    name: Build and Deploy Staging Backend Container App
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail

          require_nonempty() {
            local value="$1"
            local label="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required value: $label"
              exit 1
            fi
          }

          reject_cross_environment_target() {
            local value="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
            local label="$2"

            if printf '%s' "$value" | grep -Eq 'prod(uction)?' \
              && ! printf '%s' "$value" | grep -Eq 'staging'; then
              echo "::error::$label points at a production target: $1"
              exit 1
            fi
          }

          QA_BYPASS_ENABLED="true"
          QA_BYPASS_USERS="qa-smoke-user"
          EXPECTED_APP_NAME="${{ vars.AZURE_CONTAINER_APP_STAGING_NAME }}"
          EXPECTED_RESOURCE_GROUP="${{ vars.AZURE_CONTAINER_APP_STAGING_RESOURCE_GROUP }}"
          API_HOST="${{ vars.AZURE_STAGING_API_HOST }}"
          IMAGE_TAG="${{ env.IMAGE_REPO }}:sha-${{ github.sha }}"

          require_nonempty "$EXPECTED_APP_NAME" "AZURE_CONTAINER_APP_STAGING_NAME"
          require_nonempty "$EXPECTED_RESOURCE_GROUP" "AZURE_CONTAINER_APP_STAGING_RESOURCE_GROUP"
          require_nonempty "$API_HOST" "AZURE_STAGING_API_HOST"
          reject_cross_environment_target "$EXPECTED_APP_NAME" "AZURE_CONTAINER_APP_STAGING_NAME"
          reject_cross_environment_target "$EXPECTED_RESOURCE_GROUP" "AZURE_CONTAINER_APP_STAGING_RESOURCE_GROUP"
          reject_cross_environment_target "$API_HOST" "AZURE_STAGING_API_HOST"

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "qa_bypass_enabled=$QA_BYPASS_ENABLED" >> "$GITHUB_OUTPUT"
          echo "qa_bypass_users=$QA_BYPASS_USERS" >> "$GITHUB_OUTPUT"
          echo "expected_container_app=$EXPECTED_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "expected_resource_group=$EXPECTED_RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "api_host=$API_HOST" >> "$GITHUB_OUTPUT"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Discover Azure Container App target
        id: discover
        run: |
          set -euo pipefail

          OVERRIDE_APP_NAME="${{ steps.target.outputs.expected_container_app }}"
          OVERRIDE_RESOURCE_GROUP="${{ steps.target.outputs.expected_resource_group }}"
          API_HOST="${{ steps.target.outputs.api_host }}"
          APP_NAME=""
          RESOURCE_GROUP=""

          exact_lookup() {
            local name="$1"
            az containerapp list \
              --query "[?name=='${name}'].resourceGroup | [0]" \
              -o tsv
          }

          target_exists() {
            local name="$1"
            local resource_group="$2"
            az containerapp show \
              --name "$name" \
              --resource-group "$resource_group" \
              --query "name" \
              -o tsv >/dev/null 2>&1
          }

          if target_exists "$OVERRIDE_APP_NAME" "$OVERRIDE_RESOURCE_GROUP"; then
            APP_NAME="$OVERRIDE_APP_NAME"
            RESOURCE_GROUP="$OVERRIDE_RESOURCE_GROUP"
            echo "Using explicit Container App target from GitHub variables."
          else
            echo "::warning::Configured staging Container App target does not exist. Falling back to DNS and Azure inventory discovery."
          fi

          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "Resolving live backend from DNS: $API_HOST"
            CANONICAL_HOST=$(dig +short "$API_HOST" \
              | sed 's/\.$//' \
              | grep 'azurecontainerapps.io$' \
              | head -n1 || true)
            if [ -n "$CANONICAL_HOST" ]; then
              APP_NAME="${CANONICAL_HOST%%.*}"
              RESOURCE_GROUP=$(exact_lookup "$APP_NAME")
            fi
          fi

          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            MATCH_COUNT=$(az containerapp list \
              --query "[?contains(name, 'backend') && contains(name, 'staging') ] | length(@)" \
              -o tsv)
            if [ "$MATCH_COUNT" = "1" ]; then
              APP_NAME=$(az containerapp list \
                --query "[?contains(name, 'backend') && contains(name, 'staging') ].name | [0]" \
                -o tsv)
              RESOURCE_GROUP=$(exact_lookup "$APP_NAME")
            fi
          fi

          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "::error::Unable to resolve the staging Azure Container App target."
            az containerapp list \
              --query "[].{name:name,resourceGroup:resourceGroup,fqdn:properties.latestRevisionFqdn}" \
              -o table
            exit 1
          fi

          if printf '%s\n%s\n' "$APP_NAME" "$RESOURCE_GROUP" | tr '[:upper:]' '[:lower:]' | grep -Eq 'prod(uction)?' \
            && ! printf '%s\n%s\n' "$APP_NAME" "$RESOURCE_GROUP" | tr '[:upper:]' '[:lower:]' | grep -Eq 'staging'; then
            echo "::error::Resolved staging target points at production resources: $APP_NAME in $RESOURCE_GROUP"
            exit 1
          fi

          echo "container_app=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"

      - name: Deploy backend to Azure Container Apps
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ steps.discover.outputs.container_app }}" \
            --resource-group "${{ steps.discover.outputs.resource_group }}" \
            --image "${{ steps.target.outputs.image_tag }}" \
            --set-env-vars \
              QA_AUTH_BYPASS_ENABLED="${{ steps.target.outputs.qa_bypass_enabled }}" \
              QA_AUTH_BYPASS_USER_IDS="${{ steps.target.outputs.qa_bypass_users }}"

      - name: Smoke test staging backend
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.discover.outputs.container_app }}"
          RG_NAME="${{ steps.discover.outputs.resource_group }}"
          EXPECTED_IMAGE="${{ steps.target.outputs.image_tag }}"

          LATEST_REVISION=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --query 'properties.latestRevisionName' \
            -o tsv)

          for i in $(seq 1 20); do
            LATEST_READY=$(az containerapp show \
              --name "$APP_NAME" \
              --resource-group "$RG_NAME" \
              --query 'properties.latestReadyRevisionName' \
              -o tsv)
            REVISION_FQDN=$(az containerapp show \
              --name "$APP_NAME" \
              --resource-group "$RG_NAME" \
              --query 'properties.latestRevisionFqdn' \
              -o tsv)
            REVISION_IMAGE=$(az containerapp revision show \
              --name "$APP_NAME" \
              --resource-group "$RG_NAME" \
              --revision "$LATEST_REVISION" \
              --query 'properties.template.containers[0].image' \
              -o tsv)

            if [ "$REVISION_IMAGE" != "$EXPECTED_IMAGE" ]; then
              echo "::error::Revision image mismatch: expected $EXPECTED_IMAGE, got $REVISION_IMAGE"
              exit 1
            fi

            if [ "$LATEST_READY" = "$LATEST_REVISION" ] && [ -n "$REVISION_FQDN" ]; then
              HEALTH_STATUS=$(curl -s -o /tmp/health.txt -w "%{http_code}" "https://${REVISION_FQDN}/health")
              if [ "$HEALTH_STATUS" = "200" ]; then
                RUNS_STATUS=$(curl -s -o /tmp/runs.json -w "%{http_code}" \
                  -H "X-User-Id: qa-smoke-user" \
                  "https://${REVISION_FQDN}/api/runs")
                if [ "$RUNS_STATUS" != "200" ]; then
                  echo "::error::Expected staging QA bypass to return 200 on /api/runs, got $RUNS_STATUS"
                  cat /tmp/runs.json || true
                  exit 1
                fi

                LLM_CONFIGS_STATUS=$(curl -s -o /tmp/llm-configs.json -w "%{http_code}" \
                  -H "X-User-Id: qa-smoke-user" \
                  "https://${REVISION_FQDN}/api/llm-configs")
                if [ "$LLM_CONFIGS_STATUS" != "200" ]; then
                  echo "::error::Expected staging QA bypass to return 200 on /api/llm-configs, got $LLM_CONFIGS_STATUS"
                  cat /tmp/llm-configs.json || true
                  exit 1
                fi

                echo "Staging smoke tests passed."
                exit 0
              fi
            fi

            sleep 15
          done

          echo "::error::Staging revision failed to become ready"
          az containerapp revision show \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --revision "$LATEST_REVISION"
          az containerapp logs show \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --revision "$LATEST_REVISION" \
            --tail 100 || true
          exit 1

  deploy-production:
    name: Build and Deploy Production Backend to AKS
    if: >-
      ${{
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
         github.event.inputs.environment == 'production')
      }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push backend image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}

      - name: Resolve production AKS target
        id: target
        env:
          AKS_CLUSTER_NAME_OVERRIDE: ${{ vars.AZURE_AKS_PRODUCTION_CLUSTER_NAME }}
          AKS_RESOURCE_GROUP_OVERRIDE: ${{ vars.AZURE_AKS_PRODUCTION_RESOURCE_GROUP }}
          API_HOST_OVERRIDE: ${{ vars.AZURE_PRODUCTION_API_HOST }}
        run: |
          set -euo pipefail

          require_nonempty() {
            local value="$1"
            local label="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required value: $label"
              exit 1
            fi
          }

          reject_nonprod_value() {
            local value="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
            local label="$2"
            if printf '%s' "$value" | grep -Eq 'staging|nonprod'; then
              echo "::error::$label points at a non-production target: $1"
              exit 1
            fi
          }

          AKS_CLUSTER_NAME="${AKS_CLUSTER_NAME_OVERRIDE:-}"
          AKS_RESOURCE_GROUP="${AKS_RESOURCE_GROUP_OVERRIDE:-}"
          API_HOST="${API_HOST_OVERRIDE:-api.helloautoflow.com}"
          K8S_NAMESPACE="autoflow-production"
          K8S_SECRET_NAME="autoflow-backend-secrets"
          GHCR_IMAGE="${{ env.IMAGE_REPO }}:sha-${{ github.sha }}"

          require_nonempty "$AKS_CLUSTER_NAME" "AZURE_AKS_PRODUCTION_CLUSTER_NAME"
          require_nonempty "$AKS_RESOURCE_GROUP" "AZURE_AKS_PRODUCTION_RESOURCE_GROUP"
          reject_nonprod_value "$AKS_CLUSTER_NAME" "AZURE_AKS_PRODUCTION_CLUSTER_NAME"
          reject_nonprod_value "$AKS_RESOURCE_GROUP" "AZURE_AKS_PRODUCTION_RESOURCE_GROUP"
          reject_nonprod_value "$API_HOST" "AZURE_PRODUCTION_API_HOST"

          echo "aks_cluster_name=$AKS_CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "aks_resource_group=$AKS_RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "api_host=$API_HOST" >> "$GITHUB_OUTPUT"
          echo "k8s_namespace=$K8S_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "k8s_secret_name=$K8S_SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=$GHCR_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Import production image into ACR
        id: acr
        run: |
          set -euo pipefail

          ACR_NAME=$(az acr list \
            --query "[?contains(name, 'autoflow') && contains(name, 'production')].name | [0]" \
            -o tsv)
          if [ -z "$ACR_NAME" ]; then
            echo "::error::Unable to resolve the production ACR name."
            exit 1
          fi

          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          ACR_IMAGE="${ACR_LOGIN_SERVER}/autoflow-backend:sha-${{ github.sha }}"

          az acr import \
            --name "$ACR_NAME" \
            --source "${{ steps.target.outputs.ghcr_image }}" \
            --image "autoflow-backend:sha-${{ github.sha }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "acr_image=$ACR_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ steps.target.outputs.aks_resource_group }}
          cluster-name: ${{ steps.target.outputs.aks_cluster_name }}
          subscription: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Bootstrap production backend secret
        env:
          BACKEND_ENV_PRODUCTION: ${{ secrets.AZURE_BACKEND_ENV_PRODUCTION }}
        run: |
          set -euo pipefail

          if [ -z "${BACKEND_ENV_PRODUCTION}" ]; then
            echo "::error::Missing required production environment secret: AZURE_BACKEND_ENV_PRODUCTION"
            exit 1
          fi

          tmpfile=$(mktemp)
          trap 'rm -f "$tmpfile"' EXIT
          printf '%s\n' "${BACKEND_ENV_PRODUCTION}" > "$tmpfile"

          kubectl apply -f k8s/production/namespace.yaml
          kubectl create secret generic "${{ steps.target.outputs.k8s_secret_name }}" \
            --from-env-file="$tmpfile" \
            --namespace "${{ steps.target.outputs.k8s_namespace }}" \
            --dry-run=client \
            -o yaml \
            | kubectl apply -f -

      - name: Apply production backend manifests
        run: |
          set -euo pipefail
          kubectl apply -f k8s/production/backend.yaml
          kubectl set image deployment/backend \
            backend="${{ steps.acr.outputs.acr_image }}" \
            -n "${{ steps.target.outputs.k8s_namespace }}"
          kubectl rollout status deployment/backend -n "${{ steps.target.outputs.k8s_namespace }}" --timeout=300s
          kubectl get deployment backend -n "${{ steps.target.outputs.k8s_namespace }}" -o wide
          kubectl get service backend -n "${{ steps.target.outputs.k8s_namespace }}" -o wide

      - name: Smoke test production backend
        run: |
          set -euo pipefail

          NAMESPACE="${{ steps.target.outputs.k8s_namespace }}"
          TARGET=""

          for i in $(seq 1 30); do
            TARGET=$(kubectl get svc backend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -z "$TARGET" ]; then
              TARGET=$(kubectl get svc backend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            fi
            if [ -n "$TARGET" ]; then
              break
            fi
            echo "Waiting for production backend LoadBalancer endpoint ($i/30)"
            sleep 10
          done

          if [ -z "$TARGET" ]; then
            echo "::error::Production backend service did not receive a public load balancer endpoint."
            kubectl describe svc backend -n "$NAMESPACE"
            exit 1
          fi

          for i in $(seq 1 20); do
            HEALTH_STATUS=$(curl -s -o /tmp/health.txt -w "%{http_code}" "http://${TARGET}/health" || true)
            echo "Attempt $i: /health => $HEALTH_STATUS"
            if [ "$HEALTH_STATUS" = "200" ]; then
              break
            fi
            sleep 10
          done

          if [ "${HEALTH_STATUS:-}" != "200" ]; then
            echo "::error::Production /health never returned 200"
            cat /tmp/health.txt || true
            kubectl logs deployment/backend -n "$NAMESPACE" --tail=100 || true
            exit 1
          fi

          RUNS_STATUS=$(curl -s -o /tmp/runs.json -w "%{http_code}" "http://${TARGET}/api/runs" || true)
          if [ "$RUNS_STATUS" != "401" ]; then
            echo "::error::Expected production /api/runs to require auth with 401, got $RUNS_STATUS"
            cat /tmp/runs.json || true
            exit 1
          fi

          echo "Production smoke tests passed against ${TARGET}."

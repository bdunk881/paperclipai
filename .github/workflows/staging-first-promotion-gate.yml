name: Staging-First Promotion Gate

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read

jobs:
  verify-source-branch:
    name: Staging-First Promotion Gate
    runs-on: ubuntu-latest
    steps:
      - name: Require staging as the PR head branch
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"

          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "::error title=Master promotions must come from staging::Feature and Dependabot PRs must target staging. Only the dedicated staging -> master promotion PR may target master. If this PR was opened against master by mistake, retarget it with 'gh pr edit ${{ github.event.pull_request.number }} --base staging' or let the Auto-Retarget workflow fix it."
            exit 1
          fi

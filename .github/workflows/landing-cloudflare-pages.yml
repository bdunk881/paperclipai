name: Deploy Landing to Cloudflare Pages

on:
  pull_request:
    paths:
      - "landing/**"
      - ".github/workflows/landing-cloudflare-pages.yml"
  push:
    paths:
      - "landing/**"
      - ".github/workflows/landing-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: landing-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pull Cloudflare secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: auto-flow-va-pt
          env-slug: production

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required Infisical secret ${name}"
              exit 1
            fi
          done

      - name: Inject NEXT_PUBLIC_API_URL for build (HEL-84)
        # landing/lib/publicApi.ts reads this at build time. Without it, the
        # signup + checkout buttons fall back to a relative /api path which
        # 404s against the static landing site. Per-target-branch routing
        # matches the dashboard host-map convention.
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$TARGET_BRANCH" == "dev" ]]; then
            echo "NEXT_PUBLIC_API_URL=https://dev-api.helloautoflow.com" >> "$GITHUB_ENV"
          elif [[ "$TARGET_BRANCH" == "staging" ]]; then
            echo "NEXT_PUBLIC_API_URL=https://staging-api.helloautoflow.com" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_API_URL=https://api.helloautoflow.com" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Build landing
        working-directory: landing
        run: npm run build

      - name: Resolve deploy artifact
        id: artifact
        working-directory: landing
        run: |
          set -euo pipefail
          if [[ -d build/client ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "path=build/client" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.artifact.outputs.deploy == 'true'
        id: deploy
        working-directory: landing
        env:
          DEPLOY_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          set -uo pipefail

          # NB: Do NOT use `set -e` around the wrangler invocation. Command-substitution
          # capture (`$()`) discards the output if the command fails under `set -e`,
          # which previously silently swallowed wrangler's error message and made
          # deploy failures impossible to diagnose.
          set +e
          deploy_output="$(npx wrangler@4 pages deploy "${{ steps.artifact.outputs.path }}" \
            --project-name=autoflow-landing \
            --branch="${DEPLOY_BRANCH}" 2>&1)"
          deploy_status=$?
          set -e

          printf '%s\n' "$deploy_output"

          if [[ $deploy_status -ne 0 ]]; then
            echo "::error::wrangler pages deploy exited with status ${deploy_status}"
            exit "$deploy_status"
          fi

          deploy_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -n 1)"
          if [[ -z "$deploy_url" ]]; then
            echo "::error::Cloudflare Pages deploy did not return a deployment URL"
            exit 1
          fi

          echo "deployment-url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Summarize deployment
        env:
          DEPLOY_ENABLED: ${{ steps.artifact.outputs.deploy }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.pages-deployment-id }}
          DEPLOYMENT_ENVIRONMENT: ${{ steps.deploy.outputs.pages-environment }}
        run: |
          {
            echo "## Cloudflare Pages deployment"
            echo
            if [[ "${DEPLOY_ENABLED}" == "true" ]]; then
              echo "- Environment: ${DEPLOYMENT_ENVIRONMENT:-unknown}"
              echo "- Deployment ID: ${DEPLOYMENT_ID:-unknown}"
              echo "- Deployment URL: ${DEPLOYMENT_URL:-unavailable}"
              echo "- Alias URL: ${DEPLOYMENT_ALIAS_URL:-unavailable}"
            else
              echo "- Skipped direct Pages deploy because \`landing/build/client\` does not exist on this branch yet."
              echo "- This workflow will start deploying automatically once the RR7 landing build output lands on \`${GITHUB_REF_NAME}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

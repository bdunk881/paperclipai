name: Deploy Dashboard to Cloudflare Pages

on:
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-cloudflare-pages.yml"
  push:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: dashboard-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_SUPABASE_URL: ${{ github.ref_name == 'dev' && secrets.DEV_SUPABASE_URL || secrets.PRODUCTION_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ github.ref_name == 'dev' && secrets.DEV_SUPABASE_ANON_KEY || secrets.PRODUCTION_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: dashboard
          packageManager: npm
          command: >-
            pages deploy dist
            --project-name=autoflow-dashboard
            --branch=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Summarize deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.pages-deployment-id }}
          DEPLOYMENT_ENVIRONMENT: ${{ steps.deploy.outputs.pages-environment }}
        run: |
          {
            echo "## Cloudflare Pages deployment"
            echo
            echo "- Environment: ${DEPLOYMENT_ENVIRONMENT:-unknown}"
            echo "- Deployment ID: ${DEPLOYMENT_ID:-unknown}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-unavailable}"
            echo "- Alias URL: ${DEPLOYMENT_ALIAS_URL:-unavailable}"
          } >> "$GITHUB_STEP_SUMMARY"

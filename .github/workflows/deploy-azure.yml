name: Deploy to Azure (AKS)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write   # required for OIDC / azure/login

env:
  REGISTRY: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}

jobs:
  build-and-push:
    name: Build & Push Images to ACR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.AZURE_ACR_LOGIN_SERVER }}

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata (${{ matrix.service }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/autoflow-${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.helloautoflow.com
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend to staging AKS
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/autoflow-backend:sha-${{ github.sha }}"
          kubectl set image deployment/backend backend="${IMAGE}" \
            --namespace autoflow-staging
          kubectl rollout status deployment/backend --namespace autoflow-staging --timeout=5m

      - name: Deploy frontend to staging AKS
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/autoflow-frontend:sha-${{ github.sha }}"
          kubectl set image deployment/frontend frontend="${IMAGE}" \
            --namespace autoflow-staging
          kubectl rollout status deployment/frontend --namespace autoflow-staging --timeout=5m

      - name: Smoke test staging
        run: |
          sleep 15
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.helloautoflow.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Staging health check failed after 10 attempts"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://helloautoflow.com
    # GitHub environment protection rules enforce the manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend to production AKS
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/autoflow-backend:sha-${{ github.sha }}"
          kubectl set image deployment/backend backend="${IMAGE}" \
            --namespace autoflow-production
          kubectl rollout status deployment/backend --namespace autoflow-production --timeout=5m

      - name: Deploy frontend to production AKS
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/autoflow-frontend:sha-${{ github.sha }}"
          kubectl set image deployment/frontend frontend="${IMAGE}" \
            --namespace autoflow-production
          kubectl rollout status deployment/frontend --namespace autoflow-production --timeout=5m

      - name: Verify production health
        run: |
          sleep 15
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://helloautoflow.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Production health check failed after 10 attempts"
          exit 1

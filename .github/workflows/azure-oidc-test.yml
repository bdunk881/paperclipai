name: Test Azure OIDC Auth

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
  push:
    branches:
      - main
    paths:
      - '.github/workflows/azure-oidc-test.yml'

permissions:
  id-token: write
  contents: read

jobs:
  test-azure-access:
    name: Test Azure Subscription Access
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID || '' }}
          allow-no-subscriptions: true

      - name: List subscriptions
        run: |
          echo "=== Subscriptions ==="
          az account list --output table

      - name: Show current account
        run: |
          echo "=== Current Account ==="
          az account show --output table || echo "No default subscription set"

      - name: List resource groups
        run: |
          echo "=== Resource Groups ==="
          az group list --output table || echo "No resource groups or insufficient permissions"

      - name: Check service principal RBAC
        run: |
          echo "=== Role Assignments ==="
          az role assignment list --assignee "$ARM_CLIENT_ID" --output table || echo "Cannot list role assignments"

      - name: Verify tenant
        run: |
          echo "=== Tenant Details ==="
          az account tenant list --output table

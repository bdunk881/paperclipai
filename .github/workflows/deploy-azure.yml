name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/${{ github.repository }}-backend

jobs:
  deploy:
    name: Build and Deploy Backend Container App
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.environment }}"
          else
            DEPLOY_ENV="staging"
          fi

          if [ "$DEPLOY_ENV" = "production" ]; then
            RG_NAME="rg-autoflow-production"
            APP_NAME="ca-autoflow-production-backend"
          else
            RG_NAME="rg-autoflow-staging"
            APP_NAME="ca-autoflow-staging-backend"
          fi

          IMAGE_TAG="${{ env.IMAGE_REPO }}:sha-${{ github.sha }}"

          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "container_app=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Verify backend Container App exists
        run: |
          set -euo pipefail
          az containerapp show \
            --name "${{ steps.target.outputs.container_app }}" \
            --resource-group "${{ steps.target.outputs.resource_group }}" \
            --query 'name' \
            -o tsv >/dev/null

      - name: Deploy backend to Azure Container Apps
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ steps.target.outputs.container_app }}" \
            --resource-group "${{ steps.target.outputs.resource_group }}" \
            --image "${{ steps.target.outputs.image_tag }}"

      - name: Smoke test backend
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            --name "${{ steps.target.outputs.container_app }}" \
            --resource-group "${{ steps.target.outputs.resource_group }}" \
            --query 'properties.configuration.ingress.fqdn' \
            -o tsv)

          URL="https://${FQDN}/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

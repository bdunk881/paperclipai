name: Deploy TS Express API to Fly (production)

# HEL-96 — deploys the consolidated AutoFlow Express backend to
# `autoflow-api-production`. Cutover happens when api.helloautoflow.com's
# Cloudflare CNAME swaps from autoflow-fastapi-production.fly.dev →
# autoflow-api-production.fly.dev. Provider OAuth callback URLs + Stripe
# webhook URLs do NOT change — only the Fly app behind the hostname does.

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "docker/api/**"
      - "fly.api.production.toml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-fly-api-production.yml"
      - "infra/scripts/fly_api_smoke.sh"
      - "migrations/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-fly-api-production
  cancel-in-progress: false

env:
  FLY_APP: autoflow-api-production
  FLY_REGION: ord

jobs:
  validate:
    name: Validate backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --config jest.config.cjs --runInBand --testPathIgnorePatterns="dashboard"
        env:
          AUTOFLOW_ALLOW_INMEMORY: "true"
          NODE_ENV: test

  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    needs: [validate]
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Pull production secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: auto-flow-va-pt
          env-slug: production

      - name: Verify required env vars
        run: |
          set -euo pipefail
          for v in FLY_API_TOKEN INFISICAL_PROJECT_ID INFISICAL_TOKEN_PRODUCTION; do
            if [[ -z "${!v:-}" ]]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if ! flyctl apps list | grep -q "^${FLY_APP}\b"; then
            flyctl apps create "${FLY_APP}" --org personal
          fi

      - name: Sync Fly machine-level secrets
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            INFISICAL_PROJECT_ID="${INFISICAL_PROJECT_ID}" \
            INFISICAL_TOKEN="${INFISICAL_TOKEN_PRODUCTION}" \
            --app "${FLY_APP}" \
            --stage

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.api.production.toml \
            --remote-only \
            --strategy bluegreen \
            --build-arg BUILD_SHA="${{ github.sha }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Smoke test
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
          FLY_API_SMOKE_ORIGIN: https://app.helloautoflow.com
        run: |
          bash infra/scripts/fly_api_smoke.sh "https://${FLY_APP}.fly.dev"

      - name: Summarize
        run: |
          {
            echo "## Deploy: ${FLY_APP}"
            echo
            echo "- Health: $(curl -s -o /dev/null -w '%{http_code}' https://${FLY_APP}.fly.dev/health)"
            echo "- Custom domain (post-cutover): https://api.helloautoflow.com"
          } >> "$GITHUB_STEP_SUMMARY"

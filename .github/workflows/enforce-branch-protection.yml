name: Enforce Branch Protection

on:
  workflow_dispatch:
    inputs:
      staging_required_checks:
        description: "Comma-separated CI status check names required on staging"
        required: false
        default: ""
      master_required_checks:
        description: "Comma-separated CI status check names required on master"
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  protect:
    name: Enforce Protected Branch Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate admin token
        env:
          GH_TOKEN: ${{ secrets.BRANCH_ADMIN_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing BRANCH_ADMIN_TOKEN secret with repo admin scope"
            exit 1
          fi

      - name: Load required checks
        id: required-checks
        run: |
          echo "staging=$(jq -cr '.staging | join(\",\")' infra/branch-protection/required-checks.json)" >> "$GITHUB_OUTPUT"
          echo "master=$(jq -cr '.master | join(\",\")' infra/branch-protection/required-checks.json)" >> "$GITHUB_OUTPUT"

      - name: Apply branch protection
        env:
          GH_TOKEN: ${{ secrets.BRANCH_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STAGING_REQUIRED_CHECKS: ${{ github.event.inputs.staging_required_checks || steps.required-checks.outputs.staging }}
          MASTER_REQUIRED_CHECKS: ${{ github.event.inputs.master_required_checks || steps.required-checks.outputs.master }}
          MASTER_ALLOWED_USERS: bdunk881
          STAGING_ALLOWED_USERS: bdunk881
        run: bash infra/scripts/enforce_branch_protection.sh

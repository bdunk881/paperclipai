name: Dashboard Staging QA Gate

on:
  push:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-staging-gate.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: preview
        type: choice
        options: [preview, production]

permissions:
  contents: read

concurrency:
  group: dashboard-staging-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview-deploy:
    name: Deploy Dashboard Preview
    if: |
      (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'preview')
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@52.0.0

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Verify preview auth env parity
        run: |
          set -euo pipefail
          mkdir -p dashboard/.vercel
          npx vercel env pull dashboard/.vercel/.env.preview --environment=preview --yes --token="$VERCEL_TOKEN" >/dev/null
          for required in VITE_AZURE_CLIENT_ID VITE_AZURE_TENANT_SUBDOMAIN; do
            if ! grep -q "^${required}=" dashboard/.vercel/.env.preview; then
              echo "::error::Missing ${required} in Vercel preview environment"
              exit 1
            fi
          done

      - name: Deploy preview
        id: deploy
        run: |
          set -euo pipefail
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          PREVIEW_URL="$(vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN" | tail -n 1 | tr -d '\r')"
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::Vercel preview deploy did not return a URL"
            exit 1
          fi
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

  smoke-auth-preview:
    name: Smoke Test Preview Auth
    needs: preview-deploy
    if: ${{ needs.preview-deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browser
        working-directory: dashboard
        run: npx playwright install --with-deps chromium webkit

      - name: Run preview auth smoke test
        working-directory: dashboard
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.preview-deploy.outputs.preview_url }}
        run: npm run e2e -- e2e/preview-auth-smoke.spec.ts

  qa-gate:
    name: QA Gate (Manual Approval via Environment)
    needs: smoke-auth-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: staging-qa
    steps:
      - name: QA checklist
        run: |
          echo "Smoke tests passed."
          echo "Approve this environment deployment to satisfy the QA gate."

  production-deploy:
    name: Deploy Dashboard Production
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@52.0.0

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Verify production auth env parity
        run: |
          set -euo pipefail
          mkdir -p dashboard/.vercel
          npx vercel env pull dashboard/.vercel/.env.production --environment=production --yes --token="$VERCEL_TOKEN" >/dev/null
          for required in VITE_AZURE_CLIENT_ID VITE_AZURE_TENANT_SUBDOMAIN; do
            if ! grep -q "^${required}=" dashboard/.vercel/.env.production; then
              echo "::error::Missing ${required} in Vercel production environment"
              exit 1
            fi
          done

      - name: Deploy production
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          PROD_URL="$(vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" | tail -n 1 | tr -d '\r')"
          echo "Production URL: $PROD_URL"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: autoflow-staging
  labels:
    app: frontend
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        environment: staging
    spec:
      containers:
        - name: frontend
          # Image tag is overwritten by deploy-azure.yml via kubectl set image
          image: autoflowacr.azurecr.io/autoflow-frontend:latest
          ports:
            - containerPort: 80
          securityContext:
            capabilities:
              drop:
                - NET_RAW
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: autoflow-staging
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

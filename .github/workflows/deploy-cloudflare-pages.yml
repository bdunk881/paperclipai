name: Deploy Dashboard to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy to the Cloudflare Pages production project
        required: true
        default: staging
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: autoflow-dashboard
      DEPLOY_REF: ${{ github.event.inputs.deploy_ref }}
      PAGES_BRANCH: master
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_API_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_AZURE_CIAM_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
      VITE_AZURE_CIAM_TENANT_SUBDOMAIN: ${{ secrets.VITE_AZURE_TENANT_SUBDOMAIN }}
      VITE_USE_MOCK: "false"
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_REF }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          for key in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            VITE_API_BASE_URL \
            VITE_AZURE_CIAM_CLIENT_ID \
            VITE_AZURE_CIAM_TENANT_SUBDOMAIN; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required deploy setting: ${key}"
              exit 1
            fi
          done

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Deploy dashboard to Cloudflare Pages production
        working-directory: dashboard
        run: |
          set -euo pipefail
          npx wrangler pages deploy dist \
            --project-name "$PROJECT_NAME" \
            --branch "$PAGES_BRANCH" \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "Deploy ${DEPLOY_REF} via GitHub Actions"

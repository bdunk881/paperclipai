name: Deploy FastAPI Fly.io

on:
  push:
    branches: [staging]
    paths:
      - "backend/**"
      - "docker/backend/Dockerfile"
      - "fly.toml"
      - "fly.production.toml"
      - "infra/scripts/fly_fastapi_smoke.sh"
      - "backend/fly-cutover-probe-matrix.md"
      - ".github/workflows/deploy-fly-fastapi-staging.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target Fly environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      production_relay_base_url:
        description: Optional pre-cutover relay override for production dispatches
        required: false
        type: string
      production_relay_host_header:
        description: Optional Host header override for production relay requests
        required: false
        type: string
      production_custom_domain:
        description: Optional production custom domain to register on the Fly app
        required: false
        type: string

concurrency:
  group: deploy-fly-fastapi-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-backend:
    name: Validate FastAPI backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/test_knowledge_api.py -q

  deploy:
    name: Deploy Fly.io app
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    env:
      FLY_DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
      FLY_PRODUCTION_APP_FALLBACK: autoflow-fastapi-production
      FLY_PRODUCTION_BASE_URL_FALLBACK: https://autoflow-fastapi-production.fly.dev
      FLY_PRODUCTION_CUSTOM_DOMAIN_FALLBACK: api.helloautoflow.com
      FLY_PRODUCTION_RELAY_BASE_URL_FALLBACK: https://api.helloautoflow.com
      FLY_PRODUCTION_RELAY_HOST_HEADER_FALLBACK: ""
      FLY_STAGING_APP_FALLBACK: autoflow-fastapi-staging
      FLY_STAGING_BASE_URL_FALLBACK: https://autoflow-fastapi-staging.fly.dev
      FLY_SHARED_SMOKE_USER_FALLBACK: qa-smoke-user
      FLY_CUTOVER_HOST: api.helloautoflow.com
    steps:
      - uses: actions/checkout@v5

      - name: Resolve Fly deployment settings
        id: settings
        run: |
          set -euo pipefail

          env_name="${FLY_DEPLOY_ENV}"
          if [[ "$env_name" == "production" ]]; then
            app_name="${{ vars.FLY_PRODUCTION_APP_NAME }}"
            if [[ -z "$app_name" ]]; then
              app_name="${FLY_PRODUCTION_APP_FALLBACK}"
            fi

            base_url="${{ vars.FLY_PRODUCTION_BASE_URL }}"
            if [[ -z "$base_url" ]]; then
              base_url="${FLY_PRODUCTION_BASE_URL_FALLBACK}"
            fi

            smoke_user_id="${{ vars.FLY_PRODUCTION_SMOKE_USER_ID }}"
            if [[ -z "$smoke_user_id" ]]; then
              smoke_user_id="${FLY_SHARED_SMOKE_USER_FALLBACK}"
            fi

            relay_base_url="${{ github.event.inputs.production_relay_base_url }}"
            if [[ -z "$relay_base_url" ]]; then
              relay_base_url="${{ vars.FLY_PRODUCTION_RELAY_BASE_URL }}"
            fi
            if [[ -z "$relay_base_url" ]]; then
              relay_base_url="${FLY_PRODUCTION_RELAY_BASE_URL_FALLBACK}"
            fi

            relay_host_header="${{ github.event.inputs.production_relay_host_header }}"
            if [[ -z "$relay_host_header" ]]; then
              relay_host_header="${{ vars.FLY_PRODUCTION_RELAY_HOST_HEADER }}"
            fi
            if [[ -z "$relay_host_header" ]]; then
              relay_host_header="${FLY_PRODUCTION_RELAY_HOST_HEADER_FALLBACK}"
            fi

            relay_insecure_tls="false"
            if [[ -n "$relay_host_header" ]]; then
              relay_insecure_tls="true"
            fi

            custom_domain="${{ github.event.inputs.production_custom_domain }}"
            if [[ -z "$custom_domain" ]]; then
              custom_domain="${{ vars.FLY_PRODUCTION_CUSTOM_DOMAIN }}"
            fi
            if [[ -z "$custom_domain" ]]; then
              custom_domain="${FLY_PRODUCTION_CUSTOM_DOMAIN_FALLBACK}"
            fi

            config_path="fly.production.toml"
            artifact_prefix="fastapi-fly-production"
            stateful_kb_checks="false"
          else
            app_name="${{ vars.FLY_STAGING_APP_NAME }}"
            if [[ -z "$app_name" ]]; then
              app_name="${FLY_STAGING_APP_FALLBACK}"
            fi

            base_url="${{ vars.FLY_STAGING_BASE_URL }}"
            if [[ -z "$base_url" ]]; then
              base_url="${FLY_STAGING_BASE_URL_FALLBACK}"
            fi

            smoke_user_id="${{ vars.FLY_STAGING_SMOKE_USER_ID }}"
            if [[ -z "$smoke_user_id" ]]; then
              smoke_user_id="${FLY_SHARED_SMOKE_USER_FALLBACK}"
            fi

            relay_base_url="https://staging-api.helloautoflow.com"
            relay_host_header=""
            relay_insecure_tls="false"
            custom_domain=""
            config_path="fly.toml"
            artifact_prefix="fastapi-fly-staging"
            stateful_kb_checks="true"
          fi

          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
          echo "smoke_user_id=$smoke_user_id" >> "$GITHUB_OUTPUT"
          echo "relay_base_url=$relay_base_url" >> "$GITHUB_OUTPUT"
          echo "relay_host_header=$relay_host_header" >> "$GITHUB_OUTPUT"
          echo "relay_insecure_tls=$relay_insecure_tls" >> "$GITHUB_OUTPUT"
          echo "custom_domain=$custom_domain" >> "$GITHUB_OUTPUT"
          echo "config_path=$config_path" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=$artifact_prefix" >> "$GITHUB_OUTPUT"
          echo "stateful_kb_checks=$stateful_kb_checks" >> "$GITHUB_OUTPUT"

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        run: |
          set -euo pipefail
          if flyctl status --app "${{ steps.settings.outputs.app_name }}" >/dev/null 2>&1; then
            exit 0
          fi
          flyctl apps create "${{ steps.settings.outputs.app_name }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure Fly production custom domain
        if: ${{ env.FLY_DEPLOY_ENV == 'production' && steps.settings.outputs.custom_domain != '' }}
        run: |
          set -euo pipefail
          OUT_DIR="artifacts/fly-fastapi-smoke"
          mkdir -p "$OUT_DIR"
          domain="${{ steps.settings.outputs.custom_domain }}"
          app="${{ steps.settings.outputs.app_name }}"

          if flyctl certs show "$domain" --app "$app" > "$OUT_DIR/fly-cert-show.txt" 2>&1; then
            echo "Fly custom domain already registered: $domain"
          else
            flyctl certs add "$domain" --app "$app" | tee "$OUT_DIR/fly-cert-add.txt"
            flyctl certs show "$domain" --app "$app" | tee "$OUT_DIR/fly-cert-show.txt"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Sync Fly relay secrets
        run: |
          set -euo pipefail
          flyctl secrets set \
            FASTAPI_EDGE_RELAY_BASE_URL="${{ steps.settings.outputs.relay_base_url }}" \
            FASTAPI_EDGE_RELAY_HOST_HEADER="${{ steps.settings.outputs.relay_host_header }}" \
            FASTAPI_EDGE_RELAY_INSECURE_TLS="${{ steps.settings.outputs.relay_insecure_tls }}" \
            --app "${{ steps.settings.outputs.app_name }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy FastAPI Fly.io service
        run: |
          flyctl deploy \
            --remote-only \
            --config "${{ steps.settings.outputs.config_path }}" \
            --app "${{ steps.settings.outputs.app_name }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Capture Fly target evidence
        run: |
          set -euo pipefail
          OUT_DIR="artifacts/fly-fastapi-smoke"
          mkdir -p "$OUT_DIR"
          flyctl status --app "${{ steps.settings.outputs.app_name }}" | tee "$OUT_DIR/fly-status.txt"
          flyctl ips list --app "${{ steps.settings.outputs.app_name }}" | tee "$OUT_DIR/fly-ips.txt"
          {
            echo "# FastAPI Fly.io DNS-Ready Evidence"
            echo
            echo "- Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Environment: ${FLY_DEPLOY_ENV}"
            echo "- Fly app: ${{ steps.settings.outputs.app_name }}"
            echo "- Stable Fly hostname: ${{ steps.settings.outputs.base_url }}"
            echo "- Current cutover host: ${FLY_CUTOVER_HOST}"
            echo "- Relay base URL used for this deploy: ${{ steps.settings.outputs.relay_base_url }}"
            echo "- Relay Host header override: ${{ steps.settings.outputs.relay_host_header }}"
            echo "- Relay insecure TLS: ${{ steps.settings.outputs.relay_insecure_tls }}"
            echo "- Custom domain: ${{ steps.settings.outputs.custom_domain }}"
            echo
            echo "## Notes"
            echo
            if [[ "${FLY_DEPLOY_ENV}" == "production" ]]; then
              if [[ "${{ steps.settings.outputs.relay_base_url }}" == "${FLY_PRODUCTION_RELAY_BASE_URL_FALLBACK}" ]]; then
                echo "- This production pre-cutover deploy used \`${FLY_PRODUCTION_RELAY_BASE_URL_FALLBACK}\` as the relay base URL."
                echo "- Before Phase 5a DNS cutover, replace that relay with the direct legacy Azure ingress hostname so callback/webhook traffic does not loop back into Fly after api.helloautoflow.com moves."
              else
                echo "- Production relay base URL already points at an explicit legacy upstream target."
              fi
              if [[ -n "${{ steps.settings.outputs.relay_host_header }}" ]]; then
                echo "- The relay path uses an explicit Host header override for legacy Azure ingress routing."
              fi
              if [[ -n "${{ steps.settings.outputs.custom_domain }}" ]]; then
                echo "- The workflow attempted to ensure the Fly custom domain is registered before DNS cutover."
              fi
            else
              echo "- Staging relay remains pinned to the legacy staging API host."
            fi
          } > "$OUT_DIR/dns-ready-cutover.md"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify current DNS state
        run: |
          set -euo pipefail
          OUT_DIR="artifacts/fly-fastapi-smoke"
          mkdir -p "$OUT_DIR"
          {
            echo "# Current DNS Snapshot"
            echo
            echo "- Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Host: ${FLY_CUTOVER_HOST}"
            echo
            echo '```text'
            dig +short "${FLY_CUTOVER_HOST}"
            echo '```'
          } > "$OUT_DIR/dns-current.md"
 
      - name: Run FastAPI smoke checks
        run: bash infra/scripts/fly_fastapi_smoke.sh
        env:
          FASTAPI_SMOKE_BASE_URL: ${{ steps.settings.outputs.base_url }}
          FASTAPI_SMOKE_USER_ID: ${{ steps.settings.outputs.smoke_user_id }}
          FASTAPI_SMOKE_ENABLE_STATEFUL_KB_CHECKS: ${{ steps.settings.outputs.stateful_kb_checks }}

      - name: Upload FastAPI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.settings.outputs.artifact_prefix }}-evidence-${{ github.run_id }}
          path: artifacts/fly-fastapi-smoke/
          retention-days: 14

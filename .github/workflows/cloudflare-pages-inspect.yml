name: Inspect Cloudflare Pages Project

on:
  workflow_dispatch:
    inputs:
      project:
        description: Cloudflare Pages project name to inspect
        required: true
        default: autoflow-dashboard-git

permissions:
  contents: read

jobs:
  inspect:
    name: Inspect Pages project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull Cloudflare secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          method: universal-auth
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: autoflow
          env-slug: production

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required Infisical secret ${name}"
              exit 1
            fi
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inspect Cloudflare Pages project state
        env:
          CF_PAGES_INSPECT_PROJECT: ${{ inputs.project }}
        run: node infra/scripts/cloudflare-pages-inspect.mjs

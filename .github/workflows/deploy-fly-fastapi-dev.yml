name: Deploy FastAPI Fly.io Dev

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
      - "docker/backend/Dockerfile"
      - "fly.dev.toml"
      - "infra/scripts/fly_fastapi_smoke.sh"
      - ".github/workflows/deploy-fly-fastapi-dev.yml"
  workflow_dispatch:

concurrency:
  group: deploy-fly-fastapi-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-backend:
    name: Validate FastAPI backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/test_knowledge_api.py -q

  deploy:
    name: Deploy dev Fly.io app
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: dev
    env:
      FLY_DEV_APP_FALLBACK: autoflow-fastapi-dev
      FLY_DEV_BASE_URL_FALLBACK: https://autoflow-fastapi-dev.fly.dev
      FLY_DEV_ALLOWED_ORIGINS: https://dev.helloautoflow.com
      FLY_SHARED_SMOKE_USER_FALLBACK: qa-smoke-user
    steps:
      - uses: actions/checkout@v5

      - name: Resolve Fly deployment settings
        id: settings
        run: |
          set -euo pipefail

          app_name="${{ vars.FLY_DEV_APP_NAME }}"
          if [[ -z "$app_name" ]]; then
            app_name="${FLY_DEV_APP_FALLBACK}"
          fi

          base_url="${{ vars.FLY_DEV_BASE_URL }}"
          if [[ -z "$base_url" ]]; then
            base_url="${FLY_DEV_BASE_URL_FALLBACK}"
          fi

          smoke_user_id="${{ vars.FLY_DEV_SMOKE_USER_ID }}"
          if [[ -z "$smoke_user_id" ]]; then
            smoke_user_id="${FLY_SHARED_SMOKE_USER_FALLBACK}"
          fi

          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
          echo "smoke_user_id=$smoke_user_id" >> "$GITHUB_OUTPUT"

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if flyctl status --app "${{ steps.settings.outputs.app_name }}" >/dev/null 2>&1; then
            exit 0
          fi
          flyctl apps create "${{ steps.settings.outputs.app_name }}"

      - name: Sync dev Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DEV_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          DEV_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          DEV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          required_vars=(
            DEV_DATABASE_URL
            DEV_SUPABASE_URL
            DEV_SUPABASE_ANON_KEY
            DEV_SUPABASE_SERVICE_ROLE_KEY
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret ${name}"
              exit 1
            fi
          done

          flyctl secrets set \
            APP_ENV=dev \
            DATABASE_URL="${DEV_DATABASE_URL}" \
            SUPABASE_URL="${DEV_SUPABASE_URL}" \
            SUPABASE_ANON_KEY="${DEV_SUPABASE_ANON_KEY}" \
            SUPABASE_SERVICE_ROLE_KEY="${DEV_SUPABASE_SERVICE_ROLE_KEY}" \
            ALLOWED_ORIGINS="${FLY_DEV_ALLOWED_ORIGINS}" \
            AUTH_NATIVE_AUTH_PROXY_ALLOWED_ORIGINS="${FLY_DEV_ALLOWED_ORIGINS}" \
            --app "${{ steps.settings.outputs.app_name }}"

      - name: Deploy FastAPI Fly.io service
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --remote-only \
            --config fly.dev.toml \
            --app "${{ steps.settings.outputs.app_name }}"

      - name: Run FastAPI smoke checks
        run: bash infra/scripts/fly_fastapi_smoke.sh
        env:
          FASTAPI_SMOKE_BASE_URL: ${{ steps.settings.outputs.base_url }}
          FASTAPI_SMOKE_USER_ID: ${{ steps.settings.outputs.smoke_user_id }}
          FASTAPI_SMOKE_ORIGIN: https://dev.helloautoflow.com

      - name: Upload FastAPI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-fly-dev-evidence-${{ github.run_id }}
          path: artifacts/fly-fastapi-smoke/
          retention-days: 14
